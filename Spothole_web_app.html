<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spothole</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #dcdcdc;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  .phone {
    width: 390px;
    background: #dcdcdc;
    padding: 14px;
  }

  /* ── Upper panel ── */
  .upper-panel {
    background: white;
    border-radius: 18px;
    padding: 14px;
    position: relative;
    overflow: hidden;
    margin-bottom: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  /* Row 1: Speed + Direction */
  .row-speed {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .metric-box {
    flex: 1;
    background: #f0f0f0;
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
  }
  .metric-primary {
    font-size: 38px;
    font-weight: 300;
    color: #111;
    line-height: 1;
  }
  .metric-unit {
    font-size: 13px;
    color: #888;
    font-weight: 400;
  }

  /* Row 2: X Y Z */
  .row-xyz {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .xyz-box {
    flex: 1;
    background: #f0f0f0;
    border-radius: 12px;
    padding: 10px 6px;
    text-align: center;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 2px;
  }
  .xyz-number {
    font-size: 30px;
    font-weight: 300;
    color: #111;
    line-height: 1;
  }
  .xyz-symbol {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.4;
    -webkit-text-stroke: 0.6px currentColor;
  }
  .xyz-symbol.x { color: #1a6fd4; }
  .xyz-symbol.y { color: #27ae60; -webkit-text-stroke: 1px #27ae60; font-size: 26px; }
  .xyz-symbol.z { color: #e74c3c; }

  /* Graph */
  .graph-wrap {
    background: #efefef;
    border-radius: 10px;
    padding: 8px 8px 4px;
    margin-bottom: 8px;
    position: relative;
  }
  canvas#graph {
    display: block;
    width: 100%;
    height: 115px;
  }
  .graph-legend {
    position: absolute;
    top: 8px;
    right: 12px;
    display: flex;
    gap: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 12px;
    font-weight: 700;
  }
  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
  }

  /* Status row */
  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 0 0;
  }
  .status-label { color: #aaa; font-size: 14px; }
  .status-dots { display: flex; gap: 5px; }
  .sdot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }

  /* ── SpotOn overlay ── */
  .spoton-overlay {
    position: absolute;
    inset: 0;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #ff6500;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
  }
  .spoton-word {
    font-size: 72px;
    font-weight: 900;
    color: white;
    letter-spacing: -3px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.25);
    line-height: 1;
  }
  .spoton-sub {
    font-size: 18px;
    color: rgba(255,255,255,0.85);
    margin-top: 6px;
    font-weight: 500;
    letter-spacing: 1px;
  }

  /* ── Buttons ── */
  .buttons-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }
  .btn-start {
    flex: 1;
    background: #2ecc71;
    color: white;
    border: none;
    border-radius: 16px;
    padding: 20px 18px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s;
  }
  .btn-pothole {
    flex: 1.5;
    background: #e8e8e8;
    color: #999;
    border: none;
    border-radius: 16px;
    padding: 16px 12px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.1s;
  }
  .btn-pothole:active { background: #ddd; }
  .pothole-emoji { font-size: 36px; line-height: 1; }
  .btn-highres {
    flex: 1;
    background: #1a1a1a;
    color: white;
    border: none;
    border-radius: 16px;
    padding: 20px 12px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
  }

  /* ── Sliders panel ── */
  .sliders-panel {
    background: white;
    border-radius: 18px;
    padding: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .slider-row { margin-bottom: 18px; }
  .slider-row:last-child { margin-bottom: 0; }
  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .slider-label {
    font-size: 11.5px;
    font-weight: 800;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .slider-label.x { color: #1a6fd4; }
  .slider-label.y { color: #27ae60; }
  .slider-label.z { color: #e74c3c; }
  .slider-val { font-size: 13px; color: #555; font-weight: 500; }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 5px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  /* Colored track fills are set via JS gradient */
  input[type=range].sx { background: #e0e0e0; }
  input[type=range].sy { background: #e0e0e0; }
  input[type=range].sz { background: #e0e0e0; }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: transform 0.1s;
  }
  input[type=range]::-webkit-slider-thumb:active { transform: scale(1.15); }

  input[type=range].sx::-webkit-slider-thumb { background: #1a6fd4; }
  input[type=range].sy::-webkit-slider-thumb { background: #27ae60; }
  input[type=range].sz::-webkit-slider-thumb { background: #e74c3c; }

  /* ── Sync status ── */
  .sync-line {
    font-size: 11px;
    color: #bbb;
    margin-top: 4px;
    min-height: 14px;
    text-align: right;
  }
  .sync-line.ok  { color: #27ae60; }
  .sync-line.err { color: #e74c3c; }

  /* ── Export button ── */
  .btn-export-page {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 16px;
    background: white;
    border: none;
    border-radius: 16px;
    font-size: 15px;
    font-weight: 600;
    color: #444;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    text-decoration: none;
  }
  .btn-export-page:active { opacity: 0.7; }

  /* ── Run map overlay ── */
  .map-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }
  .map-overlay.show { display: flex; }
  .map-panel {
    background: white;
    border-radius: 18px;
    width: 100%;
    max-width: 420px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.35);
    display: flex;
    flex-direction: column;
  }
  .map-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px 8px;
  }
  .map-title { font-size: 16px; font-weight: 700; color: #111; }
  .map-close {
    border: none;
    background: #eee;
    border-radius: 50%;
    width: 30px; height: 30px;
    font-size: 15px;
    cursor: pointer;
    color: #555;
  }
  .map-filters {
    display: flex;
    gap: 6px;
    padding: 0 14px 10px;
  }
  .map-chip {
    border: none;
    background: #efefef;
    color: #666;
    border-radius: 14px;
    padding: 6px 12px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
  }
  .map-chip.active { background: #ff6500; color: white; }
  #runMap { width: 100%; height: 58vh; }
  .map-foot {
    padding: 8px 14px 12px;
    font-size: 11px;
    color: #999;
    text-align: center;
  }
  .btn-map-page {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 16px;
    background: white;
    border: none;
    border-radius: 16px;
    font-size: 15px;
    font-weight: 600;
    color: #444;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .btn-map-page:active { opacity: 0.7; }
</style>
</head>
<body>
<div class="phone">

  <!-- ── Upper panel ── -->
  <div class="upper-panel" id="upperPanel">

    <!-- SpotOn overlay -->
    <div class="spoton-overlay" id="spotonOverlay">
      <span class="spoton-word">SpotOn!</span>
      <span class="spoton-sub">bump detected</span>
    </div>

    <!-- Row 1 -->
    <div class="row-speed">
      <div class="metric-box">
        <span class="metric-primary" id="speedVal">0.2</span><span class="metric-unit"> mph</span>
      </div>
      <div class="metric-box">
        <span class="metric-primary" id="dirVal">NE</span>
      </div>
    </div>

    <!-- Barometer row (barometer-test branch) -->
    <div class="row-speed" id="baroRow" style="display:none">
      <div class="metric-box">
        <span class="metric-primary" id="baroVal">--</span><span class="metric-unit"> hPa</span>
      </div>
      <div class="metric-box">
        <span class="metric-primary" id="baroDeltaVal">--</span><span class="metric-unit"> Δ hPa</span>
      </div>
    </div>
    <div id="baroStatus" style="font-size:12px;color:#888;text-align:center;margin-bottom:6px;display:none"></div>

    <!-- Row 2: X Y Z with arrow symbols -->
    <div class="row-xyz">
      <div class="xyz-box">
        <span class="xyz-number" id="xVal">0.0</span>
        <span class="xyz-symbol x">&#x2194;</span><!-- ↔ -->
      </div>
      <div class="xyz-box">
        <span class="xyz-number" id="yVal">0.0</span>
        <span class="xyz-symbol y">&#x2195;&#xFE0E;</span><!-- ↕ text, not emoji -->
      </div>
      <div class="xyz-box">
        <span class="xyz-number" id="zVal">0.0</span>
        <span class="xyz-symbol z">Z</span>
      </div>
    </div>

    <!-- Graph -->
    <div class="graph-wrap">
      <canvas id="graph"></canvas>
      <div class="graph-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:#1a6fd4"></div>
          <span style="color:#1a6fd4">X</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#27ae60"></div>
          <span style="color:#27ae60">Y</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#e74c3c"></div>
          <span style="color:#e74c3c">Z</span>
        </div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-row">
      <span class="status-label" id="statusText">Stopped</span>
      <div class="status-dots">
        <div class="sdot"></div>
        <div class="sdot"></div>
        <div class="sdot"></div>
      </div>
    </div>
    <div class="sync-line" id="syncLine"></div>
  </div>

  <!-- ── Buttons ── -->
  <div class="buttons-row">
    <button class="btn-start" id="startBtn" onclick="toggleRecording()">
      <span id="startIcon">&#9654;</span>
      <span id="startLabel">Start</span>
    </button>
    <button class="btn-pothole" id="potholeBtn" onclick="manualBump()">
      <span class="pothole-emoji">&#x1F632;</span>
      <span>Pothole</span>
    </button>
    <button class="btn-highres" id="highResBtn" onclick="toggleHighRes()">HIGH RES</button>
  </div>

  <!-- ── Sliders ── -->
  <div class="sliders-panel" id="slidersPanel">
    <div class="slider-row">
      <div class="slider-header">
        <span class="slider-label x">X Lateral G-Force</span>
        <span class="slider-val" id="xValLbl">0.8g</span>
      </div>
      <input type="range" class="sx" id="xSlider" min="0.1" max="2" step="0.1" value="1.0">
    </div>
    <div class="slider-row">
      <div class="slider-header">
        <span class="slider-label y">Y Acceleration G-Force</span>
        <span class="slider-val" id="yValLbl">1.3g</span>
      </div>
      <input type="range" class="sy" id="ySlider" min="0.1" max="2" step="0.1" value="1.0">
    </div>
    <div class="slider-row">
      <div class="slider-header">
        <span class="slider-label z">Z Pothole G-Force</span>
        <span class="slider-val" id="zValLbl">0.6g</span>
      </div>
      <input type="range" class="sz" id="zSlider" min="0.1" max="2" step="0.1" value="1.0">
    </div>
  </div>

  <!-- ── Export link ── -->
  <a class="btn-export-page" href="export.html">&#8679; Share &amp; Export <span id="exportCount"></span></a>

  <!-- ── Run map button ── -->
  <button class="btn-map-page" onclick="openRunMap()">&#x1F5FA;&#xFE0F; View Run Map</button>

</div>

<!-- ── Run map overlay ── -->
<div class="map-overlay" id="mapOverlay">
  <div class="map-panel">
    <div class="map-head">
      <span class="map-title" id="mapTitle">Run Map</span>
      <button class="map-close" onclick="closeRunMap()">&#10005;</button>
    </div>
    <div class="map-filters" id="mapFilters" style="display:none">
      <button class="map-chip active" data-mode="severity" onclick="setMapFilter('severity')">Severity</button>
      <button class="map-chip" data-mode="recent" onclick="setMapFilter('recent')">Most recent</button>
      <button class="map-chip" data-mode="spread" onclick="setMapFilter('spread')">Spread</button>
    </div>
    <div id="runMap"></div>
    <div class="map-foot" id="mapFoot"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
// =============================================================================
// Spothole — Main App Script
// =============================================================================
// Detects road bumps using the DeviceMotion API (accelerometer) and tags each
// event with GPS coordinates via the Geolocation API. All data is saved to
// localStorage and optionally synced to Google Sheets via an Apps Script web app.
//
// Key flows:
//   Start  → requestMotion() + startGPS()
//   Motion → attachMotion() event handler → threshold check → triggerDetection()
//   Stop   → persistToday() + flushToSheet() + openRunMap()
// =============================================================================

// ── Config ────────────────────────────────────────────────
// Replace SCRIPT_URL with your own Google Apps Script deployment URL.
// SECRET must match the SECRET constant in SpotHole_AppScript.js.
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw-SPX3KVc-UqPVS5IJx_GSkGOYcSt3GqY3xMOb45qVWKQS5NYSZHNj46P5ahjuSZhAuw/exec';
const SECRET     = 'spotholekey';

// ── Thresholds ────────────────────────────────────────────
// Per-axis g-force values that trigger bump detection. Adjustable via sliders.
let xThreshold = 1.0;  // lateral (left/right)
let yThreshold = 1.0;  // acceleration (front/back)
let zThreshold = 1.0;  // vertical (up/down — potholes)

// ── Real sensor state ─────────────────────────────────────
// Last g-force readings from DeviceMotion, updated at ~60 Hz while recording.
let lastX = 0, lastY = 0, lastZ = 0;
let lastGPS = null;               // most recent GeolocationPosition object
let motionHandler = null;         // reference to the active devicemotion listener
let gpsWatchId = null;            // ID returned by watchPosition, used to cancel
let motionPermissionGranted = false;
let detectionCooldown = false;    // true for 2s after a detection to prevent double-counting

// ── Barometer state (barometer-test branch) ───────────────
let baroSensor = null;            // AbsolutePressureSensor instance
let lastBaroPressure = null;      // hPa from last reading
let baroBaseline = null;          // first reading used to compute Δ
let baroSupported = false;

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

/** Converts a compass bearing (0-360 degrees) to the nearest cardinal/intercardinal label. */
const headings = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
function degToCompass(d) { return headings[Math.round(d / 22.5) % 16]; }

/** Converts metres-per-second to miles-per-hour, returned as a string with one decimal. */
function mpsToMph(v) { return (v * 2.23694).toFixed(1); }

// ── Session + device ──────────────────────────────────────

/**
 * Generates a unique session ID based on the current timestamp.
 * Format: sess_YYYYMMDD_HHMMSS
 * @returns {string}
 */
function makeSessionId() {
  const d = new Date(), p = n => String(n).padStart(2,'0');
  return `sess_${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
}
const SESSION_ID = makeSessionId();

/**
 * Detects the device type and browser from the user-agent string.
 * Used to tag each logged row so you can filter by device in the sheet.
 * @returns {string} e.g. "iPhone / Safari"
 */
function getDeviceLabel() {
  const ua = navigator.userAgent;
  const dev = /iPhone/.test(ua) ? 'iPhone' : /iPad/.test(ua) ? 'iPad' : /Android/.test(ua) ? 'Android' : 'Unknown';
  const br  = /CriOS/.test(ua) ? 'Chrome iOS' : /Safari/.test(ua) && !/Chrome/.test(ua) ? 'Safari' : /Chrome/.test(ua) ? 'Chrome' : 'Browser';
  return `${dev} / ${br}`;
}
const DEVICE = getDeviceLabel();

// ── Pothole log + sync ────────────────────────────────────
let potholes    = [];    // all events logged this session (survives stop -> sync)
let pendingRows = [];    // rows queued for the next sheet flush
let flushTimer  = null;  // debounce timer handle for scheduleFlush
let totalSynced = 0;     // cumulative rows confirmed sent this session

/** Returns today's date as a compact YYYYMMDD string used in localStorage keys and sheet tab names. */
function getDateKey() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

/**
 * Updates the small sync-status line below the graph.
 * @param {string} state - CSS modifier: '' | 'ok' | 'err'
 * @param {string} msg   - Text to display
 */
function setSyncStatus(state, msg) {
  const el = document.getElementById('syncLine');
  el.className = 'sync-line' + (state ? ' ' + state : '');
  el.textContent = msg;
}

/** Refreshes the pothole count badge on the Export button. */
function updateExportCount() {
  const el = document.getElementById('exportCount');
  if (el && potholes.length) el.textContent = `· ${potholes.length} logged`;
  else if (el) el.textContent = '';
}

/**
 * Schedules a sheet flush 8 seconds from now (debounced).
 * Multiple calls within 8 s result in only one flush.
 */
function scheduleFlush() {
  if (flushTimer) return;
  flushTimer = setTimeout(() => { flushTimer = null; flushToSheet(); }, 8000);
}

// Sheet tab name helpers -- one tab per data type per day.
const SHEET_EVENTS    = () => getDateKey() + '_events';
const SHEET_WAVEFORMS = () => getDateKey() + '_waveforms';
const SHEET_HIGHRES   = () => getDateKey() + '_highres';

/**
 * Serialises a pothole event object to a flat array matching the sheet column order.
 * @param {Object} p - Pothole event object
 * @returns {Array}
 */
function rowToArray(p) {
  return [
    p.session_id, p.time, p.lat ?? '', p.lon ?? '',
    p.speed_mph, p.heading_deg ?? '', p.heading_compass,
    p.x_accel_g, p.y_accel_g, p.z_accel_g, p.type, p.device, p.bump_id ?? ''
  ];
}

/**
 * POSTs a batch of rows to a single sheet tab via the Apps Script web app.
 * Uses no-cors mode -- the response is opaque, but network errors still throw.
 * @param {string} sheetName - Target tab name (e.g. "20250610_events")
 * @param {Array}  rows      - Array of event objects to send
 */
async function postRows(sheetName, rows) {
  if (!rows.length) return;
  // no-cors: response is opaque but network errors still throw
  await fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({ secret: SECRET, sheetName, rows: rows.map(rowToArray) })
  });
}

/**
 * GETs the current row count from the events tab as a live confirmation.
 * Returns null on any error (network offline, CORS, etc.) -- callers treat null as "unknown".
 * @returns {Promise<number|null>}
 */
async function fetchSheetCount() {
  try {
    const r = await fetch(`${SCRIPT_URL}?date=${getDateKey()}&type=events`);
    if (!r.ok) return null;
    const j = await r.json();
    return j.rows ?? null;
  } catch(e) {
    return null;
  }
}

/**
 * Drains pendingRows and sends them to the appropriate sheet tabs in parallel.
 * Rows are split by type: summary events, pre/post waveforms, and continuous high-res.
 * On failure, rows are pushed back to the front of pendingRows and retried after 30 s.
 */
async function flushToSheet() {
  if (!pendingRows.length) return;
  const rows = pendingRows.splice(0);

  const eventsRows   = rows.filter(p => ['auto','manual','session_start'].includes(p.type));
  const waveformRows = rows.filter(p => ['pre_bump','post_bump'].includes(p.type));
  const highresRows  = rows.filter(p => p.type === 'continuous');

  setSyncStatus('', `Syncing ${rows.length} row(s)…`);
  try {
    await Promise.all([
      postRows(SHEET_EVENTS(),    eventsRows),
      postRows(SHEET_WAVEFORMS(), waveformRows),
      postRows(SHEET_HIGHRES(),   highresRows),
    ]);
    totalSynced += rows.length;
    // GET real row count from events sheet for confirmed feedback
    const count     = await fetchSheetCount();
    const sheetStr  = count != null ? ' · sheet live ✓' : '';
    setSyncStatus('ok', `Synced ${new Date().toLocaleTimeString()}${sheetStr}`);
  } catch(err) {
    pendingRows.unshift(...rows);
    setSyncStatus('err', 'Sync failed — will retry');
    setTimeout(() => { if (pendingRows.length) flushToSheet(); }, 30000);
  }
}

/**
 * Merges this session's events into the daily localStorage entry (keyed spothole_YYYYMMDD).
 * Uses session_id + time as a composite key to avoid duplicates on repeated calls.
 */
function persistToday() {
  if (!potholes.length) return;
  try {
    const key = 'spothole_' + getDateKey();
    const existing = JSON.parse(localStorage.getItem(key) || '[]');
    const seen = new Set(existing.map(p => p.session_id + '|' + p.time));
    localStorage.setItem(key, JSON.stringify([
      ...existing,
      ...potholes.filter(p => !seen.has(p.session_id + '|' + p.time))
    ]));
  } catch(e) {}
}

/**
 * Constructs a single event row object, stamping it with the current GPS fix and sensor values.
 * Optional overrides allow replaying pre-buffered waveform samples with their original timestamps.
 *
 * @param {string}  type           - Row type: 'auto' | 'manual' | 'session_start' | 'pre_bump' | 'post_bump' | 'continuous'
 * @param {string}  bumpId         - Shared ID linking pre_bump, auto, and post_bump rows for one event
 * @param {string}  [timeOverride] - ISO timestamp (used when replaying preBuf samples)
 * @param {number}  [xOverride]    - X g-force override
 * @param {number}  [yOverride]    - Y g-force override
 * @param {number}  [zOverride]    - Z g-force override
 * @returns {Object}
 */
function makeRow(type, bumpId, timeOverride, xOverride, yOverride, zOverride) {
  const c = lastGPS ? lastGPS.coords : null;
  return {
    session_id:      SESSION_ID,
    time:            timeOverride || new Date().toISOString(),
    lat:             c ? c.latitude  : null,
    lon:             c ? c.longitude : null,
    speed_mph:       c && c.speed != null ? parseFloat(mpsToMph(c.speed)) : 0,
    heading_deg:     c && c.heading != null ? Math.round(c.heading) : null,
    heading_compass: c && c.heading != null ? degToCompass(c.heading) : '—',
    x_accel_g:       parseFloat((xOverride != null ? xOverride : lastX).toFixed(3)),
    y_accel_g:       parseFloat((yOverride != null ? yOverride : lastY).toFixed(3)),
    z_accel_g:       parseFloat((zOverride != null ? zOverride : lastZ).toFixed(3)),
    type,
    device:       DEVICE,
    bump_id:      bumpId || '',
    pressure_hPa: lastBaroPressure != null ? parseFloat(lastBaroPressure.toFixed(4)) : null,
    pressure_delta_hPa: (lastBaroPressure != null && baroBaseline != null)
      ? parseFloat((lastBaroPressure - baroBaseline).toFixed(4))
      : null
  };
}

/**
 * Records a bump event, adds it to potholes[] and pendingRows[], and schedules a flush.
 * @param {string} type   - 'auto' or 'manual'
 * @param {string} bumpId - Unique bump ID from the triggering detection
 */
function triggerDetection(type, bumpId) {
  const entry = makeRow(type, bumpId || '');
  potholes.push(entry);
  pendingRows.push(entry);
  updateExportCount();
  setSyncStatus('', 'Syncing in ~8s…');
  scheduleFlush();
}

// ── Canvas ───────────────────────────────────────────────
const canvas = document.getElementById('graph');
const ctx    = canvas.getContext('2d');

/** Matches the canvas pixel dimensions to its CSS container width after layout. */
function resizeCanvas() {
  const wrap = canvas.parentElement;
  canvas.width  = (wrap.offsetWidth || 358) - 16;
  canvas.height = 115;
}
window.addEventListener('load',   resizeCanvas);
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 50); // fallback after first paint

// ── Buffers ──────────────────────────────────────────────
// Rolling graph display buffers -- oldest sample at index 0, newest at N-1.
const N    = 80;   // ~5 seconds at 16 Hz
const xBuf = new Float32Array(N);
const yBuf = new Float32Array(N);
const zBuf = new Float32Array(N);

// ── Waveform capture buffers ──────────────────────────────
// These capture the raw motion signal around each detected bump for later analysis.
const PRE_BUF_SIZE  = 30;  // ~500ms at 60 Hz -- covers bump onset with >5x margin
const POST_BUF_SIZE = 60;  // ~1000ms at 60 Hz -- captures full suspension ring-down
let preBuf     = [];       // rolling ring of {time,x,y,z} tuples; trimmed to PRE_BUF_SIZE
let postCapture = null;    // {bumpId, remaining} while collecting post-trigger samples

// ── HIGH RES burst logging ────────────────────────────────
let highResActive            = false;
let highResTimer             = null;
let highResCountdownInterval = null;
let highResCountdown         = 0;

let isRecording = false;

// ── SpotOn overlay ───────────────────────────────────────
const overlay  = document.getElementById('spotonOverlay');
let spotActive = false;
let fadeTimer  = null;

/**
 * Flashes the full-screen "SpotOn!" bump-detected overlay in the given color, then fades it out.
 * Color is chosen by the axis that triggered detection (blue=X, green=Y, red=Z, red=manual).
 * Re-entrant -- ignores calls while an existing flash is still fading.
 * @param {string} color - CSS color string
 */
function triggerSpotOn(color) {
  if (spotActive) return;
  spotActive = true;
  overlay.style.transition = 'none';
  overlay.style.background = color || '#ff6500';
  overlay.style.opacity    = '1';
  if (fadeTimer) clearTimeout(fadeTimer);
  // Let the browser paint the solid overlay first, then fade out over 2s
  fadeTimer = setTimeout(() => {
    overlay.style.transition = 'opacity 2s ease-out';
    overlay.style.opacity    = '0';
    setTimeout(() => { spotActive = false; }, 2000);
  }, 150);
}

/**
 * Handles a manual pothole tap. Only active while recording.
 * Logs a 'manual' event without needing a g-force threshold to be crossed.
 */
function manualBump() {
  if (!isRecording) return;
  triggerSpotOn('#e74c3c'); // manual = Z/pothole color
  triggerDetection('manual', '');
}

// ── HIGH RES 10-second timed burst ───────────────────────

/** Cancels HIGH RES mode, resets the button, and flushes any collected rows. */
function stopHighRes() {
  highResActive = false;
  if (highResTimer)             { clearInterval(highResTimer);             highResTimer = null; }
  if (highResCountdownInterval) { clearInterval(highResCountdownInterval); highResCountdownInterval = null; }
  const btn = document.getElementById('highResBtn');
  if (btn) { btn.style.background = '#1a1a1a'; btn.textContent = 'HIGH RES'; }
  if (pendingRows.length) scheduleFlush();
}

/**
 * Toggles a 10-second burst of continuous 10 Hz accelerometer logging.
 * Each tick appends a 'continuous' row to pendingRows.
 * Tapping the button again while active cancels early.
 */
function toggleHighRes() {
  if (!isRecording) return;
  if (highResActive) { stopHighRes(); return; } // tap again = cancel early

  highResActive    = true;
  highResCountdown = 10;
  const btn = document.getElementById('highResBtn');
  btn.style.background = '#e67e22';
  btn.textContent      = 'HIGH RES 10';

  // 10 Hz data collection
  highResTimer = setInterval(() => {
    if (!isRecording) { stopHighRes(); return; }
    pendingRows.push(makeRow('continuous', ''));
    if (pendingRows.length >= 50) scheduleFlush();
  }, 100);

  // 1 Hz countdown display + auto-stop at 0
  highResCountdownInterval = setInterval(() => {
    highResCountdown--;
    const b = document.getElementById('highResBtn');
    if (highResCountdown > 0) {
      b.textContent = `HIGH RES ${highResCountdown}`;
    } else {
      stopHighRes(); // auto-stop after 10 s
    }
  }, 1000);
}

// ── GPS ───────────────────────────────────────────────────
let gpsStatus = 'off'; // off | wait | ok | err

/** Refreshes the status bar text based on recording and GPS state. */
function updateStatusLabel() {
  const el = document.getElementById('statusText');
  if (!isRecording) { el.textContent = 'Stopped'; return; }
  const g = gpsStatus === 'ok'   ? 'GPS ✓'
          : gpsStatus === 'err'  ? 'GPS denied — check location permission'
          :                        'GPS acquiring…';
  el.textContent = 'Recording · ' + g;
}

/**
 * Starts GPS tracking. Fires a one-shot getCurrentPosition first to force the
 * permission prompt immediately, then uses watchPosition for continuous updates.
 * Updates lastGPS, speed, and heading displays on each fix.
 */
function startGPS() {
  if (!navigator.geolocation) { gpsStatus = 'err'; updateStatusLabel(); return; }
  gpsStatus = 'wait'; updateStatusLabel();
  const onFix = pos => {
    lastGPS = pos;
    if (gpsStatus !== 'ok') { gpsStatus = 'ok'; updateStatusLabel(); }
    const c = pos.coords;
    if (c.speed != null && c.speed >= 0)
      document.getElementById('speedVal').textContent = mpsToMph(c.speed);
    if (c.heading != null && !isNaN(c.heading))
      document.getElementById('dirVal').textContent = degToCompass(c.heading);
  };
  const onErr = e => {
    if (!lastGPS) { gpsStatus = 'err'; updateStatusLabel(); }
  };
  // one-shot for a fast first fix (also forces the permission prompt right away)
  navigator.geolocation.getCurrentPosition(onFix, onErr, { enableHighAccuracy: true, timeout: 15000 });
  gpsWatchId = navigator.geolocation.watchPosition(onFix, onErr,
    { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 });
}

/** Stops GPS tracking and clears the watch handle. */
function stopGPS() {
  if (gpsWatchId != null) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
}

// ── DeviceMotion ──────────────────────────────────────────

/**
 * Requests DeviceMotion permission (required on iOS 13+) and attaches the listener.
 * On non-iOS browsers DeviceMotionEvent.requestPermission does not exist, so we skip
 * straight to attachMotion(). Falls back to startDisplayTimer() if DeviceMotion is
 * unavailable (e.g. desktop).
 */
function requestMotion() {
  if (typeof DeviceMotionEvent === 'undefined') { startDisplayTimer(); return; }
  if (motionPermissionGranted) { attachMotion(); return; }
  if (typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission()
      .then(s => { if (s === 'granted') { motionPermissionGranted = true; attachMotion(); } })
      .catch(() => {});
  } else {
    motionPermissionGranted = true;
    attachMotion();
  }
}

/**
 * Attaches the devicemotion event listener (idempotent -- safe to call multiple times).
 *
 * Axis mapping: The physical device axes are remapped to match the car's reference frame:
 *   e.acceleration.x  -> lastX  (lateral -- left/right sway)
 *   e.acceleration.z  -> lastY  (front/back -- braking/acceleration)
 *   e.acceleration.y  -> lastZ  (vertical -- potholes/bumps)
 *
 * On each event while recording:
 *   1. Pushes a sample onto the pre-trigger ring buffer.
 *   2. Appends a post_bump row if a capture is in progress.
 *   3. Checks thresholds; on exceedance, snapshots the pre-buffer,
 *      starts post-capture, and calls triggerDetection().
 */
function attachMotion() {
  if (motionHandler) return;
  motionHandler = e => {
    // Prefer e.acceleration (no gravity) if available, else use accelerationIncludingGravity
    const ag = (e.acceleration && e.acceleration.x != null)
               ? e.acceleration : e.accelerationIncludingGravity;
    if (!ag) return;
    const toG = v => v != null ? Math.abs(v) / 9.81 : 0;
    lastX = toG(ag.x);
    lastY = toG(ag.z);  // physical Z (front/back) -> Y Acceleration slot
    lastZ = toG(ag.y);  // physical Y (up/down)    -> Z Pothole slot

    if (isRecording) {
      // ── Maintain pre-trigger ring buffer (runs every event, ~60 Hz) ──
      preBuf.push({ time: new Date().toISOString(), x: lastX, y: lastY, z: lastZ });
      if (preBuf.length > PRE_BUF_SIZE) preBuf.shift();

      // ── Collect post-trigger samples if a bump was just detected ──
      if (postCapture) {
        pendingRows.push(makeRow('post_bump', postCapture.bumpId));
        postCapture.remaining--;
        if (postCapture.remaining <= 0) {
          postCapture = null;
          scheduleFlush();
        }
      }

      // ── Threshold detection ──
      if (!detectionCooldown) {
        const xOver = lastX / xThreshold;
        const yOver = lastY / yThreshold;
        const zOver = lastZ / zThreshold;
        const maxOver = Math.max(xOver, yOver, zOver);
        if (maxOver >= 1.0) {
          detectionCooldown = true;
          setTimeout(() => { detectionCooldown = false; }, 2000);
          const axisColor = xOver === maxOver ? '#1a6fd4'
                          : yOver === maxOver ? '#27ae60'
                          :                    '#e74c3c';
          triggerSpotOn(axisColor);

          // Snapshot pre-buffer -> queue as pre_bump rows
          const bumpId = SESSION_ID + '_' + Date.now();
          const snap = preBuf.slice(); // copy before it mutates
          snap.forEach(s => {
            pendingRows.push(makeRow('pre_bump', bumpId, s.time, s.x, s.y, s.z));
          });

          // Start post-trigger collection
          postCapture = { bumpId, remaining: POST_BUF_SIZE };

          // Single summary row for this bump event
          triggerDetection('auto', bumpId);
        }
      }
    }
  };
  window.addEventListener('devicemotion', motionHandler, true);
  startDisplayTimer();
}

// ── Display timer: push real readings into graph buffer ───
let displayTimer = null;

/**
 * Starts the ~16 Hz display timer that shifts new sensor values into the
 * rolling graph buffers and updates the X/Y/Z number readouts.
 * Idempotent -- safe to call if already running.
 */
function startDisplayTimer() {
  if (displayTimer) return;
  displayTimer = setInterval(() => {
    if (!isRecording) return;
    xBuf.copyWithin(0, 1); xBuf[N-1] = lastX;
    yBuf.copyWithin(0, 1); yBuf[N-1] = lastY;
    zBuf.copyWithin(0, 1); zBuf[N-1] = lastZ;
    document.getElementById('xVal').textContent = lastX.toFixed(1);
    document.getElementById('yVal').textContent = lastY.toFixed(1);
    document.getElementById('zVal').textContent = lastZ.toFixed(1);
  }, 60); // ~16 Hz
}

/** Stops the display timer. */
function stopDisplayTimer() {
  if (displayTimer) { clearInterval(displayTimer); displayTimer = null; }
}

// ── Draw graph ───────────────────────────────────────────

/**
 * Renders one frame of the scrolling X/Y/Z graph onto the canvas.
 * Called every animation frame via requestAnimationFrame.
 * Each axis is drawn normalised to its threshold so the dashed line at the
 * top represents the detection boundary for all three channels simultaneously.
 */
function drawGraph() {
  const w = canvas.width, h = canvas.height;
  if (w < 2) return; // not yet laid out

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#efefef';
  ctx.fillRect(0, 0, w, h);

  if (!isRecording) {
    // flat baseline when stopped
    ctx.save();
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(0, h - 4); ctx.lineTo(w, h - 4); ctx.stroke();
    ctx.restore();
    return;
  }

  // dashed threshold line near top
  ctx.save();
  ctx.strokeStyle = '#d0d0d0';
  ctx.lineWidth = 1;
  ctx.setLineDash([5, 5]);
  ctx.beginPath(); ctx.moveTo(0, h * 0.12); ctx.lineTo(w, h * 0.12); ctx.stroke();
  ctx.restore();

  const bufs      = [xBuf, yBuf, zBuf];
  const colors    = ['#1a6fd4', '#27ae60', '#e74c3c'];
  const thresholds = [xThreshold, yThreshold, zThreshold];

  bufs.forEach((buf, i) => {
    const tMax = thresholds[i];
    ctx.save();
    ctx.strokeStyle = colors[i];
    ctx.lineWidth   = 3.5;
    ctx.lineJoin    = 'round';
    ctx.lineCap     = 'round';
    ctx.beginPath();
    for (let j = 0; j < N; j++) {
      const px   = (j / (N - 1)) * w;
      const norm = Math.min(Math.abs(buf[j]) / tMax, 1.0);
      const py   = (h - 4) - norm * (h - 8) * 0.88;
      j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.restore();
  });
}

// ── Animation loop (draw only) ───────────────────────────
function loop() {
  requestAnimationFrame(loop);
  drawGraph();
}
loop();

// ── Recording toggle ─────────────────────────────────────

/**
 * Starts or stops a recording session.
 *
 * On START: resets all buffers, writes a session_start row to confirm
 *   connectivity, then starts GPS and motion listeners.
 *
 * On STOP: tears down sensors, persists events to localStorage, flushes
 *   any remaining rows to the sheet, and opens the run map if there's data.
 */
// ── Barometer (barometer-test branch) ────────────────────────────────────────
//
// Uses the Generic Sensor API (AbsolutePressureSensor).
// Supported: Chrome on Android. NOT supported: iOS Safari (no barometer API).
// The UI row is hidden until support is confirmed so it degrades gracefully.
//
// Why barometer for potholes?
//   A pothole causes the car body to dip ~5–20 cm. That's a pressure change of
//   ~0.006–0.025 hPa — tiny, but measurable in calm conditions. This branch tests
//   whether the signal is real and consistent enough to use as a secondary
//   confirmation of accelerometer bumps.

function startBarometer() {
  const statusEl = document.getElementById('baroStatus');
  const rowEl    = document.getElementById('baroRow');

  if (typeof AbsolutePressureSensor === 'undefined') {
    // Try RelativePressureSensor as fallback
    if (typeof RelativePressureSensor === 'undefined') {
      statusEl.textContent = '⚠️ Barometer not available in this browser';
      statusEl.style.display = 'block';
      return;
    }
  }

  try {
    const SensorClass = (typeof AbsolutePressureSensor !== 'undefined')
      ? AbsolutePressureSensor
      : RelativePressureSensor;

    baroSensor = new SensorClass({ frequency: 5 }); // 5 Hz — pressure changes slowly

    baroSensor.addEventListener('reading', () => {
      const hPa = baroSensor.pressure; // value in hPa
      if (baroBaseline === null) baroBaseline = hPa;
      const delta = (hPa - baroBaseline).toFixed(4);
      lastBaroPressure = hPa;

      document.getElementById('baroVal').textContent      = hPa.toFixed(2);
      document.getElementById('baroDeltaVal').textContent = (delta >= 0 ? '+' : '') + delta;
    });

    baroSensor.addEventListener('error', (e) => {
      statusEl.textContent = '⚠️ Barometer error: ' + e.error.message;
      statusEl.style.display = 'block';
      stopBarometer();
    });

    baroSensor.start();
    baroSupported = true;
    rowEl.style.display    = 'flex';
    statusEl.style.display = 'block';
    statusEl.textContent   = '📊 Barometer active — watching for pressure dips at bumps';

  } catch (e) {
    statusEl.textContent = '⚠️ Barometer unavailable: ' + e.message;
    statusEl.style.display = 'block';
  }
}

function stopBarometer() {
  if (baroSensor) {
    baroSensor.stop();
    baroSensor = null;
  }
  baroBaseline     = null;
  lastBaroPressure = null;
  document.getElementById('baroVal').textContent      = '--';
  document.getElementById('baroDeltaVal').textContent = '--';
}

function toggleRecording() {
  isRecording = !isRecording;
  const btn = document.getElementById('startBtn');
  if (isRecording) {
    btn.style.background = '#e74c3c';
    document.getElementById('startIcon').textContent  = '⏹';
    document.getElementById('startLabel').textContent = 'Stop';
    xBuf.fill(0); yBuf.fill(0); zBuf.fill(0);
    lastX = 0; lastY = 0; lastZ = 0;
    updateStatusLabel();
    detectionCooldown = false;
    preBuf = []; postCapture = null;
    // Write session header immediately -- creates the tab and confirms connectivity
    pendingRows.push(makeRow('session_start', ''));
    flushToSheet();
    startGPS();
    requestMotion();
    startBarometer();
  } else {
    btn.style.background = '#2ecc71';
    document.getElementById('startIcon').textContent  = '▶';
    document.getElementById('startLabel').textContent = 'Start';
    gpsStatus = 'off'; updateStatusLabel();
    document.getElementById('xVal').textContent = '0.0';
    document.getElementById('yVal').textContent = '0.0';
    document.getElementById('zVal').textContent = '0.0';
    stopGPS();
    stopDisplayTimer();
    stopHighRes();
    stopBarometer();
    postCapture = null;
    preBuf = [];
    if (motionHandler) {
      window.removeEventListener('devicemotion', motionHandler, true);
      motionHandler = null;
    }
    // Flush any pending rows and persist to localStorage
    if (flushTimer) { clearTimeout(flushTimer); flushTimer = null; }
    persistToday();
    if (pendingRows.length) flushToSheet();
    // End-of-run summary map
    openRunMap(true);
  }
}

// ── Run map: pins, dedup, filtering ──────────────────────
const MAX_PINS    = 10;   // above this, filtering kicks in to keep the map readable
const DEDUP_M     = 25;   // metres   -- location collision radius for deduplication
const DEDUP_MS    = 3000; // millis   -- time collision window for deduplication
let runMap = null, runMarkers = null, mapFilterMode = 'severity';

/**
 * Computes the great-circle distance between two {lat, lon} points in metres.
 * Uses the Haversine formula.
 * @param {{lat: number, lon: number}} a
 * @param {{lat: number, lon: number}} b
 * @returns {number} Distance in metres
 */
function haversineM(a, b) {
  const R = 6371000, toR = d => d * Math.PI / 180;
  const dLat = toR(b.lat - a.lat), dLon = toR(b.lon - a.lon);
  const s = Math.sin(dLat/2)**2 +
            Math.cos(toR(a.lat)) * Math.cos(toR(b.lat)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

/**
 * Returns the overall intensity of an event as the maximum g-force across all axes.
 * @param {Object} p - Pothole event object
 * @returns {number}
 */
function intensityOf(p) { return Math.max(p.z_accel_g, p.y_accel_g, p.x_accel_g); }

/**
 * Returns true if event a is "stronger" than event b.
 * Primary sort: overall intensity. Tiebreaker: z > y > x axis value.
 * @param {Object} a
 * @param {Object} b
 * @returns {boolean}
 */
function beats(a, b) {
  const ia = intensityOf(a), ib = intensityOf(b);
  if (ia !== ib) return ia > ib;
  if (a.z_accel_g !== b.z_accel_g) return a.z_accel_g > b.z_accel_g;
  if (a.y_accel_g !== b.y_accel_g) return a.y_accel_g > b.y_accel_g;
  return a.x_accel_g > b.x_accel_g;
}

/**
 * Deduplicates a list of bump events by merging those that are within
 * DEDUP_MS milliseconds OR DEDUP_M metres of each other.
 * When two events collide, the stronger one (per beats()) is kept.
 * @param {Array} events
 * @returns {Array} Deduplicated events
 */
function dedupEvents(events) {
  const sorted = [...events].sort((p, q) => new Date(p.time) - new Date(q.time));
  const reps = [];
  for (const e of sorted) {
    let merged = false;
    for (let i = 0; i < reps.length; i++) {
      const r = reps[i];
      const dt = Math.abs(new Date(e.time) - new Date(r.time));
      const dm = haversineM(e, r);
      if (dt <= DEDUP_MS || dm <= DEDUP_M) {
        if (beats(e, r)) reps[i] = e;   // collision -> keep the stronger hit
        merged = true;
        break;
      }
    }
    if (!merged) reps.push(e);
  }
  return reps;
}

/**
 * Selects up to n events using a greedy farthest-point algorithm, seeding with
 * the most severe event to ensure the worst potholes are always included.
 * Used by the "Spread" map filter to maximise geographic coverage.
 * @param {Array}  events
 * @param {number} n - Maximum number of pins to return
 * @returns {Array}
 */
function spreadSelect(events, n) {
  if (events.length <= n) return events;
  const pool = [...events].sort((a, b) => beats(a, b) ? -1 : 1);
  const sel = [pool.shift()];                 // seed with the most severe
  while (sel.length < n && pool.length) {
    let best = 0, bestD = -1;
    pool.forEach((p, i) => {
      const d = Math.min(...sel.map(s => haversineM(p, s)));
      if (d > bestD) { bestD = d; best = i; }
    });
    sel.push(pool.splice(best, 1)[0]);
  }
  return sel;
}

/**
 * Applies the active map filter to cap the pin count at MAX_PINS.
 * Filter modes: 'severity' (worst first), 'recent' (newest first), 'spread' (most spread out).
 * @param {Array} events
 * @returns {Array} At most MAX_PINS events
 */
function filterPins(events) {
  if (events.length <= MAX_PINS) return events;
  if (mapFilterMode === 'recent')
    return [...events].sort((a, b) => new Date(b.time) - new Date(a.time)).slice(0, MAX_PINS);
  if (mapFilterMode === 'spread')
    return spreadSelect(events, MAX_PINS);
  // default: severity
  return [...events].sort((a, b) => beats(a, b) ? -1 : 1).slice(0, MAX_PINS);
}

/**
 * Returns the events to display on the run map.
 * Prefers the current session; falls back to the most recent stored day
 * in localStorage that contains GPS-tagged bump events.
 * @returns {{evts: Array, label: string, noLoc: number}}
 *   evts   - Events with GPS coordinates
 *   label  - Human-readable source label (e.g. "this run", "today", "06/09/2025")
 *   noLoc  - Count of bump events that had no GPS fix (informational for footer)
 */
function getRunEvents() {
  // 1) this session's bumps with coordinates
  let evts = potholes.filter(p => p.lat != null && ['auto','manual'].includes(p.type));
  let noLoc = potholes.filter(p => p.lat == null && ['auto','manual'].includes(p.type)).length;
  let label = 'this run';
  // 2) fall back to the most recent stored day that has GPS-tagged bumps
  if (!evts.length) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && /^spothole_\d{8}$/.test(k)) keys.push(k);
    }
    keys.sort().reverse();
    for (const k of keys) {
      try {
        const f = JSON.parse(localStorage.getItem(k) || '[]')
          .filter(p => p.lat != null && ['auto','manual'].includes(p.type));
        const all2 = JSON.parse(localStorage.getItem(k) || '[]');
        noLoc = Math.max(noLoc, all2.filter(p => p.lat == null && ['auto','manual'].includes(p.type)).length);
        if (f.length) {
          evts = f;
          const d = k.slice(9);
          label = d === getDateKey() ? 'today'
                : `${d.slice(4,6)}/${d.slice(6,8)}/${d.slice(0,4)}`;
          break;
        }
      } catch(e) {}
    }
  }
  return { evts, label, noLoc };
}

/**
 * Returns the pin color for a bump event based on which axis had the highest g-force.
 * Red = Z (vertical/pothole), Green = Y (braking), Blue = X (lateral).
 * @param {Object} p - Pothole event object
 * @returns {string} CSS color
 */
function dominantAxisColor(p) {
  const m = intensityOf(p);
  if (p.z_accel_g === m) return '#e74c3c';
  if (p.y_accel_g === m) return '#27ae60';
  return '#1a6fd4';
}

/**
 * Renders the run map inside the Leaflet container.
 * Creates the map instance on first call; subsequent calls clear and redraw markers.
 * Pin radius scales with intensity (capped at 16 px). Each pin has a popup showing
 * time, type, g-forces, speed, and heading.
 */
function renderRunMap() {
  const { evts, label, noLoc } = getRunEvents();
  const all   = dedupEvents(evts);
  const pins  = filterPins(all);
  document.getElementById('mapFilters').style.display = all.length > MAX_PINS ? 'flex' : 'none';
  document.getElementById('mapTitle').textContent = `Run Map · ${pins.length} pothole${pins.length === 1 ? '' : 's'}`;
  document.getElementById('mapFoot').textContent  = !all.length
    ? (noLoc > 0
        ? `${noLoc} bump${noLoc === 1 ? '' : 's'} logged WITHOUT a GPS fix — allow location for this site and wait for "GPS ✓" before logging.`
        : 'No potholes logged yet — start a run, hit some bumps, then stop.')
    : all.length > pins.length
    ? `${all.length} unique potholes after dedup (${label}) — showing ${pins.length} (${mapFilterMode})`
    : `${all.length} unique pothole${all.length === 1 ? '' : 's'} after dedup (${label})`;

  if (!runMap) {
    runMap = L.map('runMap', { zoomControl: true });
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19, attribution: '© OpenStreetMap'
    }).addTo(runMap);
    runMarkers = L.layerGroup().addTo(runMap);
  }
  runMarkers.clearLayers();
  if (!pins.length) { runMap.setView([39.5, -98.35], 4); return; }

  pins.forEach(p => {
    const inten = intensityOf(p);
    L.circleMarker([p.lat, p.lon], {
      radius: Math.min(6 + inten * 5, 16),
      color: '#ffffff', weight: 2,
      fillColor: dominantAxisColor(p), fillOpacity: 0.9
    }).bindPopup(
      `<b>${new Date(p.time).toLocaleTimeString()}</b> · ${p.type}<br>` +
      `Z ${p.z_accel_g}g · Y ${p.y_accel_g}g · X ${p.x_accel_g}g<br>` +
      `${p.speed_mph} mph ${p.heading_compass || ''}`
    ).addTo(runMarkers);
  });
  const bounds = L.latLngBounds(pins.map(p => [p.lat, p.lon]));
  runMap.fitBounds(bounds.pad(0.25), { maxZoom: 17 });
}

/**
 * Opens the run map overlay.
 * @param {boolean} [auto=false] - If true, silently skips opening when there are no events to show.
 */
function openRunMap(auto) {
  if (typeof L === 'undefined') return;            // Leaflet not loaded (offline)
  if (auto && !getRunEvents().evts.length) return; // nothing to show, stay quiet
  document.getElementById('mapOverlay').classList.add('show');
  renderRunMap();
  setTimeout(() => runMap && runMap.invalidateSize(), 120);
}

/** Closes the run map overlay. */
function closeRunMap() {
  document.getElementById('mapOverlay').classList.remove('show');
}

/**
 * Switches the active map filter chip and re-renders the map.
 * @param {'severity'|'recent'|'spread'} mode
 */
function setMapFilter(mode) {
  mapFilterMode = mode;
  document.querySelectorAll('.map-chip').forEach(c =>
    c.classList.toggle('active', c.dataset.mode === mode));
  renderRunMap();
}

// ── Sliders ──────────────────────────────────────────────

/**
 * Handles a threshold slider change: updates the colored track fill gradient,
 * refreshes the value label, and writes the new threshold to the corresponding variable.
 * @param {HTMLInputElement} input     - The range input element
 * @param {string}           labelId  - ID of the label element to update
 * @param {string}           color    - CSS color for the filled portion of the track
 * @param {'x'|'y'|'z'}      threshKey - Which threshold variable to update
 */
function onSlider(input, labelId, color, threshKey) {
  const v   = parseFloat(input.value);
  const pct = ((v - 0.1) / (2 - 0.1)) * 100;
  input.style.background =
    `linear-gradient(to right, ${color} 0%, ${color} ${pct}%, #d8d8d8 ${pct}%, #d8d8d8 100%)`;
  document.getElementById(labelId).textContent = v.toFixed(1) + 'g';
  if (threshKey === 'x') xThreshold = v;
  if (threshKey === 'y') yThreshold = v;
  if (threshKey === 'z') zThreshold = v;
}

// ── Initialisation ────────────────────────────────────────
window.addEventListener('load', () => {
  // Wire up the three threshold sliders with their axis colors and variable keys
  const cfg = [
    { id: 'xSlider', lbl: 'xValLbl', color: '#1a6fd4', key: 'x' },
    { id: 'ySlider', lbl: 'yValLbl', color: '#27ae60', key: 'y' },
    { id: 'zSlider', lbl: 'zValLbl', color: '#e74c3c', key: 'z' },
  ];
  cfg.forEach(({ id, lbl, color, key }) => {
    const el = document.getElementById(id);
    el.oninput = () => onSlider(el, lbl, color, key);
    onSlider(el, lbl, color, key); // paint initial state
  });
  resizeCanvas();

  // Auto-clean any malformed spothole_* keys (backwards to avoid index shift on removal)
  for (let i = localStorage.length - 1; i >= 0; i--) {
    const k = localStorage.key(i);
    if (k && k.startsWith('spothole_') && !/^\d{8}$/.test(k.replace('spothole_', '')))
      localStorage.removeItem(k);
  }
});
</script>
