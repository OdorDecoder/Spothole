<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spot Hole</title>
</head>
<style>
:root {
  color-scheme: light dark;
  --bg: #f2f2f7;
  --bg-card: #ffffff;
  --bg-metric: #f2f2f7;
  --text: #000000;
  --text-2: #6e6e73;
  --text-3: #aeaeb2;
  --border: #c6c6c8;
  --border-2: #d1d1d6;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --bg-card: #1c1c1e;
    --bg-metric: #2c2c2e;
    --text: #ffffff;
    --text-2: #aeaeb2;
    --text-3: #636366;
    --border: #38383a;
    --border-2: #48484a;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--bg-card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:#E24B4A;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.main{padding:12px;display:flex;flex-direction:column;gap:12px;max-width:600px;margin:0 auto}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px}
.card-title{font-size:12px;font-weight:500;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.metric{background:var(--bg-metric);border-radius:8px;padding:10px;text-align:center}
.metric-val{font-size:20px;font-weight:500;color:var(--text);line-height:1.2}
.metric-lbl{font-size:11px;color:var(--text-2);margin-top:2px}
.sensor-row{display:flex;gap:8px;margin-bottom:8px}
.sensor-box{flex:1;background:var(--bg-metric);border-radius:8px;padding:8px 10px}
.sensor-lbl{font-size:11px;color:var(--text-2)}
.sensor-val{font-size:14px;font-weight:500;margin-top:2px}
.threshold-row{display:flex;flex-direction:column;gap:0;margin-top:8px}
.threshold-row input[type=range]{width:100%;accent-color:#E24B4A}
.threshold-labels{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.threshold-labels label{font-size:12px;color:var(--text-2)}
.thresh-val{font-size:12px;font-weight:500}
.btn-row{display:flex;gap:8px}
.btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-start{background:#1D9E75;color:#fff}
.btn-start:hover{background:#0F6E56}
.btn-stop{background:#E24B4A;color:#fff}
.btn-stop:hover{background:#A32D2D}
.btn-export{background:var(--bg-metric);border:1px solid var(--border-2);color:var(--text);font-size:13px;padding:10px 8px}
.btn-export:hover{border-color:var(--border)}
.btn-mark{background:#F5A623;color:#fff;font-size:22px;font-weight:700;padding:22px 16px;border:none;border-radius:14px;cursor:pointer;transition:all .15s;width:100%;letter-spacing:.02em;box-shadow:0 4px 12px rgba(245,166,35,.35)}
.btn-mark:hover{background:#D4881A}
.btn-mark.active{background:#1D9E75;transform:scale(0.97)}
.btn-mark:disabled{background:var(--border-2);cursor:default;transform:none;box-shadow:none}
.btn-maps{background:#1a73e8;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;padding:11px;cursor:pointer;width:100%;margin-top:8px}
.btn-maps:hover{background:#1557b0}
.log{max-height:220px;overflow-y:auto}
.log-empty{font-size:13px;color:var(--text-3);text-align:center;padding:20px 0}
.log-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.log-item:last-child{border-bottom:none}
.log-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.dot-auto{background:#E24B4A}
.dot-manual{background:#378ADD}
.log-info{flex:1;min-width:0}
.log-coords{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-meta{font-size:11px;color:var(--text-2);margin-top:2px}
.log-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.badge-auto{background:#FCEBEB;color:#A32D2D}
.badge-manual{background:#E6F1FB;color:#0C447C}
.status-bar{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);padding:6px 0 0;flex-wrap:wrap}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0}
.status-dot.gps-ok{background:#1D9E75}
.status-dot.motion-ok{background:#1D9E75}
.status-dot.running{background:#E24B4A;animation:pulse .8s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:.5}to{opacity:1}}
.card.flash-pothole{animation:potholeFlash 3s ease-out}
@keyframes potholeFlash{0%,10%{background:#F5A623}100%{background:var(--bg-card)}}
.accel-bar-wrap{position:relative;height:14px;background:linear-gradient(to right,#1D9E75,#F5A623,#E24B4A);border-radius:7px;margin-top:8px;overflow:hidden}
.accel-bar{position:absolute;right:0;top:0;height:100%;border-radius:0 7px 7px 0;background:var(--bg-metric);transition:width .1s;width:100%}
.count-badge{display:inline-block;background:#E24B4A;color:#fff;border-radius:10px;font-size:11px;font-weight:500;padding:1px 7px;margin-left:6px;vertical-align:middle}
.sync-bar{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0}
.sync-dot.ok{background:#1D9E75}
.sync-dot.busy{background:#F5A623;animation:pulse .6s ease-in-out infinite alternate}
.sync-dot.err{background:#E24B4A}
.sync-label{font-size:12px;color:var(--text-2);flex:1}
.sync-link{font-size:12px;color:#1a73e8;text-decoration:none;flex-shrink:0}
.sync-link:hover{text-decoration:underline}
.session-id{font-size:11px;color:var(--text-3);text-align:center;padding:4px 0}
</style>

<div class="header">
  <div class="logo" style="background:none;border-radius:0;overflow:hidden">
    <img src="Spothole%20logo.jpg" width="32" height="32" style="display:block;border-radius:8px;object-fit:cover" alt="Spot Hole">
  </div>
  <div>
    <div style="font-size:17px;font-weight:500">Spot Hole</div>
    <div style="font-size:12px;color:var(--text-2);margin-top:1px">GPS + motion pothole logger</div>
  </div>
</div>

<div class="main">

  <div class="card" id="sensor-card">
    <div class="card-title">Live sensors</div>
    <div class="metrics">
      <div class="metric"><div class="metric-val" id="spd">&#8212;</div><div class="metric-lbl">Speed (mph)</div></div>
      <div class="metric"><div class="metric-val" id="hdg">&#8212;</div><div class="metric-lbl">Heading</div></div>
      <div class="metric"><div class="metric-val" id="zval">&#8212;</div><div class="metric-lbl">Z-accel (g)</div></div>
    </div>
    <div class="accel-bar-wrap"><div class="accel-bar" id="accel-bar"></div></div>
    <div class="sensor-row" style="margin-top:10px">
      <div class="sensor-box"><div class="sensor-lbl">Latitude</div><div class="sensor-val" id="lat">&#8212;</div></div>
      <div class="sensor-box"><div class="sensor-lbl">Longitude</div><div class="sensor-val" id="lon">&#8212;</div></div>
    </div>
    <div class="threshold-row">
      <input type="range" id="thresh" min="0.1" max="2" step="0.05" value="1.0" oninput="updateThresh(this.value)">
      <div class="threshold-labels">
        <label>Bump threshold</label>
        <span class="thresh-val" id="thresh-val">1.0g</span>
      </div>
    </div>
    <div class="status-bar">
      <span class="status-dot" id="dot-gps"></span><span id="lbl-gps">GPS: waiting</span>
      <span style="margin:0 4px">&middot;</span>
      <span class="status-dot" id="dot-motion"></span><span id="lbl-motion">Motion: waiting</span>
      <span style="margin:0 4px">&middot;</span>
      <span class="status-dot" id="dot-running"></span><span id="lbl-running">Stopped</span>
    </div>
    <div class="session-id" id="session-display"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-start" id="btn-start" onclick="startDetection()">&#9654; Start</button>
    <button class="btn btn-stop" id="btn-stop" onclick="stopDetection()" style="display:none">&#9646;&#9646; Stop</button>
  </div>

  <button class="btn-mark" id="btn-mark" onclick="manualMark()" disabled>
    &#128073; Tap to Mark Pothole
  </button>

  <div class="card" id="log-card">
    <div class="card-title">
      Logged potholes
      <span class="count-badge" id="count">0</span>
    </div>
    <div class="log" id="log">
      <div class="log-empty" id="log-empty">No potholes logged yet. Start detection and drive!</div>
    </div>
    <div class="btn-row" style="margin-top:12px">
      <button class="btn btn-export" onclick="exportCSV()">&#8681; CSV</button>
      <button class="btn btn-export" onclick="exportGPX()">&#128205; GPX</button>
      <button class="btn btn-export" onclick="exportKML()">&#127759; KML</button>
      <button class="btn btn-export" style="color:#E24B4A" onclick="clearLog()">&#128465; Clear</button>
    </div>
    <button class="btn-maps" onclick="openInGoogleMaps()">&#128506; Open in Google Maps</button>
    <div class="sync-bar">
      <span class="sync-dot" id="sync-dot"></span>
      <span class="sync-label" id="sync-label">Sheet sync: ready</span>
      <a class="sync-link" id="sheet-link" href="#" target="_blank" style="display:none">Open Sheet &#8599;</a>
    </div>
  </div>

</div>

<script>
// ── Config — fill these in after deploying the Apps Script ────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw-SPX3KVc-UqPVS5IJx_GSkGOYcSt3GqY3xMOb45qVWKQS5NYSZHNj46P5ahjuSZhAuw/exec';
const SHEET_URL  = 'https://docs.google.com/spreadsheets/d/1BXHayOuxIZd7H8Oqq5NRRxiFq90teX0k2pdfX1N_wmU/edit';
const SECRET     = 'spotholekey';          // must match the Apps Script

// ── Browser / OS detection ────────────────────────────────────────────────
const isIOS     = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isCriOS   = /CriOS/.test(navigator.userAgent);   // Chrome on iOS
const isAndroid = /Android/.test(navigator.userAgent);

// iOS + Chrome: show overlay — Apple blocks programmatic redirect to Safari
if (isIOS && isCriOS) {
  document.body.insertAdjacentHTML('beforeend', `
    <div id="safari-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;gap:16px">
      <div style="font-size:52px">🧭</div>
      <div style="color:#fff;font-size:20px;font-weight:600">Open in Safari</div>
      <div style="color:#aeaeb2;font-size:14px;line-height:1.6">Spot Hole needs Safari on iPhone for<br>motion sensors and GPS to work.</div>
      <div style="color:#aeaeb2;font-size:13px;line-height:1.6">Tap the <strong style="color:#fff">&#9094; Share</strong> button at the bottom<br>of Chrome, then choose <strong style="color:#fff">Open in Safari</strong>.</div>
      <div style="width:100%;background:#1c1c1e;border-radius:10px;padding:12px 14px;color:#1a73e8;font-size:12px;word-break:break-all;text-align:left">${location.href}</div>
      <button onclick="navigator.clipboard.writeText(location.href).then(()=>this.textContent='✓ Copied!').catch(()=>{})" style="background:#1a73e8;color:#fff;border:none;border-radius:10px;padding:13px 28px;font-size:15px;font-weight:500;cursor:pointer">Copy Link</button>
    </div>
  `);
}

// Check permission state upfront (Android Chrome + iOS Safari 16+)
if (navigator.permissions) {
  navigator.permissions.query({ name: 'geolocation' }).then(status => {
    const showDenied = () => {
      document.getElementById('lbl-gps').textContent = isAndroid
        ? 'GPS denied — Chrome ⋮ → Settings → Site settings → Location'
        : 'GPS denied — iOS Settings → Safari → Location → Allow';
    };
    if (status.state === 'denied') showDenied();
    status.addEventListener('change', () => {
      if (status.state === 'granted') {
        document.getElementById('lbl-gps').textContent = 'GPS: ready';
      } else if (status.state === 'denied') {
        showDenied();
      }
    });
  }).catch(() => {});
}

// ── Device label ──────────────────────────────────────────────────────────
function getDeviceLabel() {
  const ua = navigator.userAgent;
  let device = 'Unknown';
  if      (/iPad/.test(ua))    device = 'iPad';
  else if (/iPhone/.test(ua))  device = 'iPhone';
  else if (/Android/.test(ua)) {
    const m = ua.match(/Android[^;]*;\s*([^)]+)\)/);
    device = m ? m[1].trim() : 'Android';
  } else if (/Macintosh/.test(ua)) device = 'Mac';
  else if (/Windows/.test(ua))     device = 'Windows';
  let browser = 'Browser';
  if      (/CriOS/.test(ua))                          browser = 'Chrome iOS';
  else if (/FxiOS/.test(ua))                          browser = 'Firefox iOS';
  else if (/Safari/.test(ua) && !/Chrome/.test(ua))   browser = 'Safari';
  else if (/Chrome/.test(ua))                         browser = 'Chrome';
  else if (/Firefox/.test(ua))                        browser = 'Firefox';
  return device + ' / ' + browser;
}
const DEVICE = getDeviceLabel();

// ── Date key + daily persistence ─────────────────────────────────────────
function getDateKey() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function persistToday() {
  // Merge current session potholes into today's localStorage entry
  if (!potholes.length) return;
  try {
    const key = 'spothole_' + getDateKey();
    const existing = JSON.parse(localStorage.getItem(key) || '[]');
    const seen = new Set(existing.map(p => p.session_id + '|' + p.time));
    const merged = [...existing, ...potholes.filter(p => !seen.has(p.session_id + '|' + p.time))];
    localStorage.setItem(key, JSON.stringify(merged));
  } catch(e) {}
}

function getAllDayData() {
  // Today's persisted data merged with any unsaved current-session potholes
  try {
    const key = 'spothole_' + getDateKey();
    const stored = JSON.parse(localStorage.getItem(key) || '[]');
    const seen = new Set(stored.map(p => p.session_id + '|' + p.time));
    return [...stored, ...potholes.filter(p => !seen.has(p.session_id + '|' + p.time))];
  } catch(e) { return potholes; }
}

// ── Session ID ────────────────────────────────────────────────────────────
function makeSessionId() {
  const d = new Date(), p = n => String(n).padStart(2,'0');
  return `sess_${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
}
const SESSION_ID = makeSessionId();
document.getElementById('session-display').textContent = 'Session: ' + SESSION_ID;

// Show sheet link if configured
if (SHEET_URL && !SHEET_URL.startsWith('YOUR')) {
  const lnk = document.getElementById('sheet-link');
  lnk.href = SHEET_URL;
  lnk.style.display = '';
}

// ── State ─────────────────────────────────────────────────────────────────
let running = false, gpsWatchId = null, motionHandler = null;
let lastGPS = null, potholes = [], threshold = 1.0, lastZ = 0;
let cooldown = false, markCooldown = false;
let pendingRows = [], flushTimer = null, totalSynced = 0;
let motionPermissionGranted = false;

const headings = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];

// ── Sync ──────────────────────────────────────────────────────────────────
function scheduleFlush() {
  if (flushTimer) return;
  flushTimer = setTimeout(() => { flushTimer = null; flushToSheet(); }, 10000);
}

async function flushToSheet() {
  if (!pendingRows.length) return;
  if (!SCRIPT_URL || SCRIPT_URL.startsWith('YOUR')) {
    setSyncStatus('', 'Sheet sync: not configured');
    return;
  }

  const rows = pendingRows.splice(0);
  setSyncStatus('busy', 'Syncing ' + rows.length + ' row(s)…');

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',  // avoids CORS preflight; works on iOS Safari
      body: JSON.stringify({
        secret: SECRET,
        sheetName: getDateKey() + '_SpotholeData',
        rows: rows.map(p => [
          p.session_id, p.time, p.lat ?? '', p.lon ?? '',
          p.speed_mph, p.heading_deg ?? '', p.heading_compass, p.z_accel_g, p.type, p.device ?? ''
        ])
      })
    });
    totalSynced += rows.length;
    setSyncStatus('ok', `Synced · ${totalSynced} rows · ${new Date().toLocaleTimeString()}`);
  } catch(err) {
    pendingRows.unshift(...rows);
    setSyncStatus('err', 'Sync failed — will retry in 30s');
    setTimeout(() => { if (pendingRows.length) flushToSheet(); }, 30000);
  }
}

function setSyncStatus(state, msg) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state ? ' ' + state : '');
  document.getElementById('sync-label').textContent = msg;
}

// ── Sensors ───────────────────────────────────────────────────────────────
function degToCompass(deg) {
  if (deg == null || isNaN(deg)) return '—';
  return headings[Math.round(deg / 22.5) % 16];
}
function mpsToMph(mps) { return (mps * 2.23694).toFixed(1); }
function updateThresh(v) { threshold = parseFloat(v); document.getElementById('thresh-val').textContent = v + 'g'; }
function updateStatus() {
  document.getElementById('dot-running').classList.toggle('running', running);
  document.getElementById('lbl-running').textContent = running ? 'Detecting' : 'Stopped';
}

// ── Detection flow ─────────────────────────────────────────────────────────
function startDetection() {
  running = true;
  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-stop').style.display  = '';
  document.getElementById('btn-mark').disabled = false;
  updateStatus();
  startGPS();
  requestMotion();
}

function stopDetection() {
  running = false;
  document.getElementById('btn-start').style.display = '';
  document.getElementById('btn-stop').style.display  = 'none';
  document.getElementById('btn-mark').disabled = true;
  updateStatus();
  if (gpsWatchId != null) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
  if (motionHandler)       { window.removeEventListener('devicemotion', motionHandler); motionHandler = null; }
  document.getElementById('dot-gps').className      = 'status-dot';
  document.getElementById('lbl-gps').textContent    = 'GPS: stopped';
  document.getElementById('dot-motion').className   = 'status-dot';
  document.getElementById('lbl-motion').textContent = 'Motion: stopped';
  // Flush remaining rows
  if (pendingRows.length) { clearTimeout(flushTimer); flushTimer = null; flushToSheet(); }
  // Persist today's data then auto-export
  persistToday();
  const allDay = getAllDayData();
  const geopts = allDay.filter(p => p.lat && p.lon);
  if (allDay.length) {
    setTimeout(() => exportCSV(), 100);
    if (geopts.length) {
      setTimeout(() => exportGPX(), 400);
      setTimeout(() => exportKML(), 700);
    }
  }
}

function startGPS() {
  if (!navigator.geolocation) { alert('Geolocation not supported.'); return; }
  gpsWatchId = navigator.geolocation.watchPosition(pos => {
    lastGPS = pos;
    const c = pos.coords;
    document.getElementById('lat').textContent = c.latitude.toFixed(6);
    document.getElementById('lon').textContent = c.longitude.toFixed(6);
    document.getElementById('spd').textContent = c.speed != null && c.speed >= 0 ? mpsToMph(c.speed) : '0.0';
    document.getElementById('hdg').textContent = c.heading != null && !isNaN(c.heading) ? degToCompass(c.heading) : '—';
    document.getElementById('dot-gps').className   = 'status-dot gps-ok';
    document.getElementById('lbl-gps').textContent = 'GPS: locked';
  }, err => {
    if (err.code === 1) {
      document.getElementById('lbl-gps').textContent = isAndroid
        ? 'GPS denied — Chrome ⋮ → Settings → Site settings → Location'
        : isCriOS
          ? 'GPS denied — iOS Settings → Chrome → Location → While Using'
          : 'GPS denied — iOS Settings → Safari → Location → Allow';
    } else {
      document.getElementById('lbl-gps').textContent = 'GPS: ' + err.message;
    }
  }, { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 });
}

function requestMotion() {
  if (typeof DeviceMotionEvent === 'undefined') {
    document.getElementById('lbl-motion').textContent = 'Motion: not supported';
    return;
  }
  if (motionPermissionGranted) { attachMotionHandler(); return; }
  if (typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission()
      .then(s => {
        if (s === 'granted') { motionPermissionGranted = true; attachMotionHandler(); }
        else document.getElementById('lbl-motion').textContent = 'Motion: denied';
      })
      .catch(() => { document.getElementById('lbl-motion').textContent = 'Motion: error'; });
  } else {
    motionPermissionGranted = true;
    attachMotionHandler();
  }
}

function attachMotionHandler() {
  if (motionHandler) return;
  motionHandler = e => {
    const ag = (e.acceleration && e.acceleration.z != null) ? e.acceleration : e.accelerationIncludingGravity;
    if (!ag) return;
    const z = ag.z != null ? ag.z / 9.81 : 0;
    lastZ = Math.abs(z);
    document.getElementById('zval').textContent = lastZ.toFixed(2);
    document.getElementById('accel-bar').style.width = Math.max(0, 100 - Math.min(100, (lastZ / threshold) * 100)) + '%';
    if (lastZ > threshold && running && !cooldown && lastGPS) triggerDetection('auto');
    document.getElementById('dot-motion').className   = 'status-dot motion-ok';
    document.getElementById('lbl-motion').textContent = 'Motion: active';
  };
  window.addEventListener('devicemotion', motionHandler);
}

// ── Detection ─────────────────────────────────────────────────────────────
function triggerDetection(type) {
  cooldown = true;
  setTimeout(() => { cooldown = false; }, 3000);
  const c = lastGPS ? lastGPS.coords : null;
  const entry = {
    session_id:      SESSION_ID,
    time:            new Date().toISOString(),
    lat:             c ? c.latitude  : null,
    lon:             c ? c.longitude : null,
    speed_mph:       c && c.speed != null && c.speed >= 0 ? parseFloat(mpsToMph(c.speed)) : 0,
    heading_deg:     c && c.heading != null ? Math.round(c.heading) : null,
    heading_compass: c && c.heading != null ? degToCompass(c.heading) : '—',
    z_accel_g:       parseFloat(lastZ.toFixed(3)),
    type,
    device:          DEVICE
  };
  potholes.push(entry);
  pendingRows.push(entry);
  addLogItem(entry);
  const sc = document.getElementById('sensor-card');
  sc.classList.remove('flash-pothole');
  void sc.offsetWidth;
  sc.classList.add('flash-pothole');
  document.getElementById('count').textContent = potholes.length;
  setSyncStatus('busy', 'Syncing in ~10s…');
  scheduleFlush();
}

function manualMark() {
  if (markCooldown) return;
  const btn = document.getElementById('btn-mark');
  btn.classList.add('active'); btn.disabled = true; markCooldown = true;
  triggerDetection('manual');
  setTimeout(() => { btn.classList.remove('active'); btn.disabled = false; markCooldown = false; }, 1000);
}

// ── Log UI ────────────────────────────────────────────────────────────────
function addLogItem(e) {
  const empty = document.getElementById('log-empty');
  if (empty) empty.remove();
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'log-item';
  const latStr = e.lat != null ? e.lat.toFixed(6) : 'no GPS';
  const lonStr = e.lon != null ? e.lon.toFixed(6) : '';
  const t = new Date(e.time).toLocaleTimeString();
  div.innerHTML = `
    <div class="log-dot ${e.type==='auto'?'dot-auto':'dot-manual'}"></div>
    <div class="log-info">
      <div class="log-coords">${latStr}${lonStr?', '+lonStr:''}</div>
      <div class="log-meta">${t} &middot; ${e.speed_mph} mph &middot; ${e.heading_compass!=='—'?e.heading_compass:'no heading'} &middot; Z: ${e.z_accel_g}g
        <span class="log-badge ${e.type==='auto'?'badge-auto':'badge-manual'}">${e.type}</span>
      </div>
    </div>`;
  log.insertBefore(div, log.firstChild);
}

// ── Export ────────────────────────────────────────────────────────────────
function exportCSV() {
  persistToday();
  const data = getAllDayData();
  if (!data.length) { alert('No potholes logged yet.'); return; }
  const hdr  = 'session_id,time,latitude,longitude,speed_mph,heading_deg,heading_compass,z_accel_g,type,device\n';
  const rows = data.map(p =>
    `${p.session_id},${p.time},${p.lat??''},${p.lon??''},${p.speed_mph},${p.heading_deg??''},${p.heading_compass},${p.z_accel_g},${p.type},"${p.device??''}"`
  ).join('\n');
  download(`${getDateKey()}_SpotholeData.csv`, hdr + rows, 'text/csv');
}

function exportGPX() {
  persistToday();
  const data = getAllDayData();
  if (!data.length) { alert('No potholes logged yet.'); return; }
  const pts = data.filter(p=>p.lat&&p.lon).map(p=>
    `  <wpt lat="${p.lat}" lon="${p.lon}"><time>${p.time}</time><name>${p.type} ${p.z_accel_g}g</name><desc>Session: ${p.session_id}, Speed: ${p.speed_mph} mph, Heading: ${p.heading_compass}, Z: ${p.z_accel_g}g, Device: ${p.device??''}</desc></wpt>`
  ).join('\n');
  download(`${getDateKey()}_SpotholeData.gpx`, `<?xml version="1.0"?>\n<gpx version="1.1" creator="Spot Hole">\n${pts}\n</gpx>`, 'application/gpx+xml');
}

function exportKML() {
  persistToday();
  const data = getAllDayData();
  if (!data.length) { alert('No potholes logged yet.'); return; }
  const placemarks = data.filter(p=>p.lat&&p.lon).map(p => {
    const color = p.type === 'auto' ? 'ff0000ff' : 'ffff0000'; // KML AABBGGRR: red=auto, blue=manual
    return `  <Placemark>
    <name>${p.type === 'auto' ? '🔴' : '🔵'} ${p.z_accel_g}g</name>
    <description>Time: ${p.time}&#10;Type: ${p.type}&#10;Speed: ${p.speed_mph} mph&#10;Heading: ${p.heading_compass}&#10;Z-accel: ${p.z_accel_g}g&#10;Session: ${p.session_id}&#10;Device: ${p.device??''}</description>
    <Style><IconStyle><color>${color}</color></IconStyle></Style>
    <Point><coordinates>${p.lon},${p.lat},0</coordinates></Point>
  </Placemark>`;
  }).join('\n');
  const kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
  <name>Spot Hole ${getDateKey()}</name>
${placemarks}
</Document>
</kml>`;
  download(`${getDateKey()}_SpotholeData.kml`, kml, 'application/vnd.google-earth.kml+xml');
}

function openInGoogleMaps() {
  const pts = potholes.filter(p => p.lat && p.lon);
  if (!pts.length) { alert('No potholes with GPS coordinates to show.'); return; }
  let url;
  if (pts.length === 1) {
    url = `https://www.google.com/maps/search/?api=1&query=${pts[0].lat},${pts[0].lon}`;
  } else {
    const MAX    = 10;
    const shown  = pts.slice(0, MAX);
    const origin = `${shown[0].lat},${shown[0].lon}`;
    const dest   = `${shown[shown.length-1].lat},${shown[shown.length-1].lon}`;
    const wpts   = shown.slice(1,-1).map(p=>`${p.lat},${p.lon}`).join('|');
    url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}${wpts?'&waypoints='+wpts:''}`;
  }
  window.open(url, '_blank');
}

function download(name, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = name; a.click();
}

function clearLog() {
  const total = getAllDayData().length;
  if (!total) return;
  if (!confirm('Clear all ' + total + " today's potholes (current session + saved)?")) return;
  potholes = [];
  try { localStorage.removeItem('spothole_' + getDateKey()); } catch(e) {}
  document.getElementById('log').innerHTML = '<div class="log-empty" id="log-empty">No potholes logged yet. Start detection and drive!</div>';
  document.getElementById('count').textContent = '0';
}
</script>
