<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spothole</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #dcdcdc;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  .phone {
    width: 390px;
    background: #dcdcdc;
    padding: 14px;
  }

  /* ── Upper panel ── */
  .upper-panel {
    background: white;
    border-radius: 18px;
    padding: 14px;
    position: relative;
    overflow: hidden;
    margin-bottom: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  /* Row 1: Speed + Direction */
  .row-speed {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .metric-box {
    flex: 1;
    background: #f0f0f0;
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
  }
  .metric-primary {
    font-size: 38px;
    font-weight: 300;
    color: #111;
    line-height: 1;
  }
  .metric-unit {
    font-size: 13px;
    color: #888;
    font-weight: 400;
  }

  /* Row 2: X Y Z */
  .row-xyz {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .xyz-box {
    flex: 1;
    background: #f0f0f0;
    border-radius: 12px;
    padding: 10px 6px;
    text-align: center;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 2px;
  }
  .xyz-number {
    font-size: 30px;
    font-weight: 300;
    color: #111;
    line-height: 1;
  }
  .xyz-symbol {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.4;
    -webkit-text-stroke: 0.6px currentColor;
  }
  .xyz-symbol.x { color: #1a6fd4; }
  .xyz-symbol.y { color: #27ae60; -webkit-text-stroke: 1px #27ae60; font-size: 26px; }
  .xyz-symbol.z { color: #e74c3c; }

  /* Graph */
  .graph-wrap {
    background: #efefef;
    border-radius: 10px;
    padding: 8px 8px 4px;
    margin-bottom: 8px;
    position: relative;
  }
  canvas#graph {
    display: block;
    width: 100%;
    height: 95px;
  }
  .graph-legend {
    position: absolute;
    top: 8px;
    right: 12px;
    display: flex;
    gap: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 12px;
    font-weight: 700;
  }
  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
  }

  /* Status row */
  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 0 0;
  }
  .status-label { color: #aaa; font-size: 14px; }
  .status-dots { display: flex; gap: 5px; }
  .sdot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
  .session-label {
    color: #bbb;
    font-size: 11px;
    text-align: right;
    margin-top: 3px;
  }

  /* ── SpotOn overlay ── */
  .spoton-overlay {
    position: absolute;
    inset: 0;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #ff6500;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
  }
  .spoton-word {
    font-size: 72px;
    font-weight: 900;
    color: white;
    letter-spacing: -3px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.25);
    line-height: 1;
  }
  .spoton-sub {
    font-size: 18px;
    color: rgba(255,255,255,0.85);
    margin-top: 6px;
    font-weight: 500;
    letter-spacing: 1px;
  }

  /* ── Buttons ── */
  .buttons-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }
  .btn-start {
    flex: 1;
    background: #2ecc71;
    color: white;
    border: none;
    border-radius: 16px;
    padding: 20px 18px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s;
  }
  .btn-pothole {
    flex: 1.5;
    background: #e8e8e8;
    color: #999;
    border: none;
    border-radius: 16px;
    padding: 16px 12px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.1s;
  }
  .btn-pothole:active { background: #ddd; }
  .pothole-emoji { font-size: 36px; line-height: 1; }
  .btn-highres {
    flex: 1;
    background: #1a1a1a;
    color: white;
    border: none;
    border-radius: 16px;
    padding: 20px 12px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
  }

  /* ── Sliders panel ── */
  .sliders-panel {
    background: white;
    border-radius: 18px;
    padding: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .slider-row { margin-bottom: 18px; }
  .slider-row:last-child { margin-bottom: 0; }
  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .slider-label {
    font-size: 11.5px;
    font-weight: 800;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .slider-label.x { color: #1a6fd4; }
  .slider-label.y { color: #27ae60; }
  .slider-label.z { color: #e74c3c; }
  .slider-val { font-size: 13px; color: #555; font-weight: 500; }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 5px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  /* Colored track fills are set via JS gradient */
  input[type=range].sx { background: #e0e0e0; }
  input[type=range].sy { background: #e0e0e0; }
  input[type=range].sz { background: #e0e0e0; }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: transform 0.1s;
  }
  input[type=range]::-webkit-slider-thumb:active { transform: scale(1.15); }

  input[type=range].sx::-webkit-slider-thumb { background: #1a6fd4; }
  input[type=range].sy::-webkit-slider-thumb { background: #27ae60; }
  input[type=range].sz::-webkit-slider-thumb { background: #e74c3c; }
</style>
</head>
<body>
<div class="phone">

  <!-- ── Upper panel ── -->
  <div class="upper-panel" id="upperPanel">

    <!-- SpotOn overlay -->
    <div class="spoton-overlay" id="spotonOverlay">
      <span class="spoton-word">SpotOn!</span>
      <span class="spoton-sub">bump detected</span>
    </div>

    <!-- Row 1 -->
    <div class="row-speed">
      <div class="metric-box">
        <span class="metric-primary" id="speedVal">0.2</span><span class="metric-unit"> mph</span>
      </div>
      <div class="metric-box">
        <span class="metric-primary" id="dirVal">NE</span>
      </div>
    </div>

    <!-- Row 2: X Y Z with arrow symbols -->
    <div class="row-xyz">
      <div class="xyz-box">
        <span class="xyz-number" id="xVal">0.0</span>
        <span class="xyz-symbol x">&#x2194;</span><!-- ↔ -->
      </div>
      <div class="xyz-box">
        <span class="xyz-number" id="yVal">0.0</span>
        <span class="xyz-symbol y">&#x2195;&#xFE0E;</span><!-- ↕ text, not emoji -->
      </div>
      <div class="xyz-box">
        <span class="xyz-number" id="zVal">0.0</span>
        <span class="xyz-symbol z">Z</span>
      </div>
    </div>

    <!-- Graph -->
    <div class="graph-wrap">
      <canvas id="graph"></canvas>
      <div class="graph-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:#1a6fd4"></div>
          <span style="color:#1a6fd4">X</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#27ae60"></div>
          <span style="color:#27ae60">Y</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#e74c3c"></div>
          <span style="color:#e74c3c">Z</span>
        </div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-row">
      <span class="status-label" id="statusText">Stopped</span>
      <div class="status-dots">
        <div class="sdot"></div>
        <div class="sdot"></div>
        <div class="sdot"></div>
      </div>
    </div>
    <div class="session-label">sess_20260608_161345</div>
  </div>

  <!-- ── Buttons ── -->
  <div class="buttons-row">
    <button class="btn-start" id="startBtn" onclick="toggleRecording()">
      <span id="startIcon">&#9654;</span>
      <span id="startLabel">Start</span>
    </button>
    <button class="btn-pothole" id="potholeBtn" onclick="manualBump()">
      <span class="pothole-emoji">&#x1F632;</span>
      <span>Pothole</span>
    </button>
    <button class="btn-highres">HIGH RES</button>
  </div>

  <!-- ── Sliders ── -->
  <div class="sliders-panel">
    <div class="slider-row">
      <div class="slider-header">
        <span class="slider-label x">X Lateral G-Force</span>
        <span class="slider-val" id="xValLbl">0.8g</span>
      </div>
      <input type="range" class="sx" id="xSlider" min="0.1" max="3" step="0.1" value="0.8">
    </div>
    <div class="slider-row">
      <div class="slider-header">
        <span class="slider-label y">Y Acceleration G-Force</span>
        <span class="slider-val" id="yValLbl">1.3g</span>
      </div>
      <input type="range" class="sy" id="ySlider" min="0.1" max="3" step="0.1" value="1.3">
    </div>
    <div class="slider-row">
      <div class="slider-header">
        <span class="slider-label z">Z Pothole G-Force</span>
        <span class="slider-val" id="zValLbl">0.6g</span>
      </div>
      <input type="range" class="sz" id="zSlider" min="0.1" max="3" step="0.1" value="0.6">
    </div>
  </div>

</div>

<script>
// ── Thresholds (declared first so nothing is undefined) ──
let xThreshold = 0.8;
let yThreshold = 1.3;
let zThreshold = 0.6;

// ── Canvas ───────────────────────────────────────────────
const canvas = document.getElementById('graph');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = canvas.parentElement;
  canvas.width  = (wrap.offsetWidth || 358) - 16;
  canvas.height = 95;
}
window.addEventListener('load',   resizeCanvas);
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 50); // fallback after first paint

// ── Buffers ──────────────────────────────────────────────
const N    = 100;
const xBuf = new Float32Array(N);
const yBuf = new Float32Array(N);
const zBuf = new Float32Array(N);

let isRecording = false;

const DIRS = ['N','NE','E','SE','S','SW','W','NW'];
let dirIdx = 2;

// Each axis has its own independent state
// X: lateral — slow drift + occasional turn spikes
let xSmooth   = 0;
let xTurn     = 0, xTurnFrames = 0;

// Y: forward/back — sinusoidal speed changes + braking
let yPhase    = 0;
let yBrake    = 0, yBrakeFrames = 0;

// Z: vertical pothole — low baseline + sharp impact spikes
let zImpact   = 0, zImpactFrames = 0;
let zCooldown = 0;

// ── SpotOn overlay ───────────────────────────────────────
const overlay  = document.getElementById('spotonOverlay');
let spotActive = false;
let fadeTimer  = null;

function triggerSpotOn() {
  if (spotActive) return;
  spotActive = true;
  const colors = ['#ff6500','#e60040','#7c00cc','#0077cc','#007a3d'];
  overlay.style.background = colors[Math.floor(Math.random() * colors.length)];
  overlay.style.transition = 'opacity 0.15s ease-in';
  overlay.style.opacity    = '1';
  if (fadeTimer) clearTimeout(fadeTimer);
  fadeTimer = setTimeout(() => {
    overlay.style.transition = 'opacity 1.5s ease-out';
    overlay.style.opacity    = '0';
    setTimeout(() => { spotActive = false; }, 1500);
  }, 2500);
}

function manualBump() {
  if (!isRecording) return;
  // Manual pothole: big Z spike, small X jostle, almost no Y
  zImpact = (0.7 + Math.random() * 0.3) * zThreshold * 2.4;
  zImpactFrames = 14;
  zCooldown = 30;
  xTurn = (Math.random() - 0.5) * xThreshold * 0.4;
  xTurnFrames = 8;
  triggerSpotOn();
}

// ── Simulate sensor ──────────────────────────────────────
function tick() {

  // ── X: lateral ───────────────────────────────────────
  // Slow random drift (road camber / gentle steering)
  xSmooth += (Math.random() - 0.5) * xThreshold * 0.04;
  xSmooth *= 0.96; // decay back toward zero
  let x = xSmooth + (Math.random() - 0.5) * xThreshold * 0.05;

  // Occasional turn spike (independent of Z)
  if (xTurnFrames > 0) {
    x += xTurn * (xTurnFrames / 10);
    xTurnFrames--;
  } else if (Math.random() < 0.008) {
    xTurn = (Math.random() - 0.5) * xThreshold * 1.8;
    xTurnFrames = 10;
  }

  // ── Y: forward/back acceleration ─────────────────────
  // Smooth sine wave simulating speed changes
  yPhase += 0.03 + Math.random() * 0.01;
  let y = Math.sin(yPhase) * yThreshold * 0.25
        + Math.sin(yPhase * 2.3) * yThreshold * 0.10
        + (Math.random() - 0.5) * yThreshold * 0.06;

  // Occasional braking event
  if (yBrakeFrames > 0) {
    y += yBrake * (yBrakeFrames / 15);
    yBrakeFrames--;
  } else if (Math.random() < 0.005) {
    yBrake = -(0.5 + Math.random() * 0.5) * yThreshold * 1.4; // braking = negative Y
    yBrakeFrames = 15;
  }

  // ── Z: vertical / pothole ────────────────────────────
  // Very low baseline road texture
  let z = Math.random() * zThreshold * 0.12;

  if (zImpactFrames > 0) {
    // Sharp spike that decays quickly
    z += zImpact * (zImpactFrames / 14);
    zImpactFrames--;
  } else if (zCooldown > 0) {
    zCooldown--;
  } else if (Math.random() < 0.012) {
    // Auto pothole — only Z spikes hard; X gets a small jostle
    zImpact = (0.6 + Math.random() * 0.4) * zThreshold * 2.2;
    zImpactFrames = 14;
    zCooldown = 45;
    xTurn = (Math.random() - 0.5) * xThreshold * 0.35;
    xTurnFrames = 6;
    triggerSpotOn();
  }

  xBuf.copyWithin(0, 1); xBuf[N-1] = x;
  yBuf.copyWithin(0, 1); yBuf[N-1] = y;
  zBuf.copyWithin(0, 1); zBuf[N-1] = z;

  document.getElementById('xVal').textContent = Math.abs(x).toFixed(1);
  document.getElementById('yVal').textContent = Math.abs(y).toFixed(1);
  document.getElementById('zVal').textContent = Math.abs(z).toFixed(1);

  const spd = (Math.random() * 3 + 0.5).toFixed(1);
  document.getElementById('speedVal').textContent = spd;
  if (Math.random() < 0.008) {
    dirIdx = (dirIdx + (Math.random() < 0.5 ? 1 : -1) + 8) % 8;
    document.getElementById('dirVal').textContent = DIRS[dirIdx];
  }
}

// ── Draw graph ───────────────────────────────────────────
function drawGraph() {
  const w = canvas.width, h = canvas.height;
  if (w < 2) return; // not yet laid out

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#efefef';
  ctx.fillRect(0, 0, w, h);

  if (!isRecording) {
    // flat baseline when stopped
    ctx.save();
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(0, h - 4); ctx.lineTo(w, h - 4); ctx.stroke();
    ctx.restore();
    return;
  }

  // dashed threshold line near top
  ctx.save();
  ctx.strokeStyle = '#d0d0d0';
  ctx.lineWidth = 1;
  ctx.setLineDash([5, 5]);
  ctx.beginPath(); ctx.moveTo(0, h * 0.12); ctx.lineTo(w, h * 0.12); ctx.stroke();
  ctx.restore();

  const bufs      = [xBuf, yBuf, zBuf];
  const colors    = ['#1a6fd4', '#27ae60', '#e74c3c'];
  const thresholds = [xThreshold, yThreshold, zThreshold];

  bufs.forEach((buf, i) => {
    const tMax = thresholds[i];
    ctx.save();
    ctx.strokeStyle = colors[i];
    ctx.lineWidth   = 3.5;
    ctx.lineJoin    = 'round';
    ctx.lineCap     = 'round';
    ctx.beginPath();
    for (let j = 0; j < N; j++) {
      const px   = (j / (N - 1)) * w;
      const norm = Math.min(Math.abs(buf[j]) / tMax, 1.0);
      const py   = (h - 4) - norm * (h - 8) * 0.88;
      j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.restore();
  });
}

// ── Animation loop ───────────────────────────────────────
let frame = 0;
function loop() {
  requestAnimationFrame(loop);
  frame++;
  if (isRecording && frame % 3 === 0) tick();
  drawGraph();
}
loop();

// ── Recording toggle ─────────────────────────────────────
function toggleRecording() {
  isRecording = !isRecording;
  const btn = document.getElementById('startBtn');
  if (isRecording) {
    btn.style.background = '#e74c3c';
    document.getElementById('startIcon').textContent  = '⏹';
    document.getElementById('startLabel').textContent = 'Stop';
    document.getElementById('statusText').textContent = 'Recording';
    // clear stale data
    xBuf.fill(0); yBuf.fill(0); zBuf.fill(0);
    xSmooth = 0; xTurn = 0; xTurnFrames = 0;
    yPhase = 0; yBrake = 0; yBrakeFrames = 0;
    zImpact = 0; zImpactFrames = 0; zCooldown = 0;
  } else {
    btn.style.background = '#2ecc71';
    document.getElementById('startIcon').textContent  = '▶';
    document.getElementById('startLabel').textContent = 'Start';
    document.getElementById('statusText').textContent = 'Stopped';
    document.getElementById('xVal').textContent = '0.0';
    document.getElementById('yVal').textContent = '0.0';
    document.getElementById('zVal').textContent = '0.0';
  }
}

// ── Sliders ──────────────────────────────────────────────
function onSlider(input, labelId, color, threshKey) {
  const v   = parseFloat(input.value);
  const pct = ((v - 0.1) / (3 - 0.1)) * 100;
  input.style.background =
    `linear-gradient(to right, ${color} 0%, ${color} ${pct}%, #d8d8d8 ${pct}%, #d8d8d8 100%)`;
  document.getElementById(labelId).textContent = v.toFixed(1) + 'g';
  if (threshKey === 'x') xThreshold = v;
  if (threshKey === 'y') yThreshold = v;
  if (threshKey === 'z') zThreshold = v;
}

window.addEventListener('load', () => {
  const cfg = [
    { id: 'xSlider', lbl: 'xValLbl', color: '#1a6fd4', key: 'x' },
    { id: 'ySlider', lbl: 'yValLbl', color: '#27ae60', key: 'y' },
    { id: 'zSlider', lbl: 'zValLbl', color: '#e74c3c', key: 'z' },
  ];
  cfg.forEach(({ id, lbl, color, key }) => {
    const el = document.getElementById(id);
    el.oninput = () => onSlider(el, lbl, color, key);
    onSlider(el, lbl, color, key);
  });
  resizeCanvas();
});
</script>
</body>
</html>
