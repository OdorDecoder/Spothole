<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spot Hole</title>
</head>
<style>
:root {
  color-scheme: light dark;
  --bg: #f2f2f7;
  --bg-card: #ffffff;
  --bg-metric: #f2f2f7;
  --text: #1c1c1e;
  --text-2: #6e6e73;
  --text-3: #aeaeb2;
  --border: #c6c6c8;
  --border-2: #d1d1d6;
  /* axis gradient stops — light mode */
  --gx-a:#0891B2; --gx-b:#F59E0B; --gx-c:#F97316;
  --gy-a:#7C3AED; --gy-b:#EC4899; --gy-c:#EF4444;
  --gz-a:#1D9E75; --gz-b:#F5A623; --gz-c:#E24B4A;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --bg-card: #1c1c1e;
    --bg-metric: #2c2c2e;
    --text: #ffffff;
    --text-2: #aeaeb2;
    --text-3: #636366;
    --border: #38383a;
    --border-2: #48484a;
    /* brighter in dark mode — readable on dark backgrounds */
    --gx-a:#38BDF8; --gx-b:#FCD34D; --gx-c:#FB923C;
    --gy-a:#A78BFA; --gy-b:#F472B6; --gy-c:#F87171;
    --gz-a:#34D39A; --gz-b:#FBBC04; --gz-c:#FF6B6B;
  }
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Header ── */
.header{background:var(--bg-card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;border-radius:9px;overflow:hidden;flex-shrink:0}
.logo img{width:100%;height:100%;object-fit:cover;display:block}
.header-text{flex:1}
.header-title{font-size:17px;font-weight:600;letter-spacing:-.02em}
.header-sub{font-size:11px;color:var(--text-3);margin-top:1px}
.header-status{display:flex;align-items:center;gap:5px}
.hd{width:8px;height:8px;border-radius:50%;background:var(--border-2)}
.hd.ok{background:#1D9E75}
.hd.live{background:#E24B4A;animation:pulse .8s ease-in-out infinite alternate}

/* ── Layout ── */
.main{padding:12px;display:flex;flex-direction:column;gap:10px;max-width:540px;margin:0 auto}

/* ── Cards ── */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.card.flash-pothole{animation:potholeFlash 3s ease-out}
@keyframes potholeFlash{0%,8%{background:#F5A623}100%{background:var(--bg-card)}}
@keyframes pulse{from{opacity:.4}to{opacity:1}}

/* ── Hero row: speed + heading ── */
.hero-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.hero-box{background:var(--bg-metric);border-radius:12px;padding:14px 10px;text-align:center}
.hero-val{font-size:38px;font-weight:300;color:var(--text);line-height:1;letter-spacing:-.03em}
.hero-lbl{font-size:11px;color:var(--text-2);margin-top:5px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}

/* ── X Y Z mini boxes ── */
.accel-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.accel-box{background:var(--bg-metric);border-radius:10px;padding:8px 6px;text-align:center}
.accel-axis{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.accel-axis.x{color:var(--gx-c)}
.accel-axis.y{color:var(--gy-c)}
.accel-axis.z{color:var(--gz-c)}
.accel-val{font-size:17px;font-weight:400;color:var(--text);line-height:1}
.accel-unit{font-size:10px;color:var(--text-3);margin-top:1px}

/* ── Axis bar + slider blocks ── */
.axis-block{margin-bottom:11px}
.axis-block:last-of-type{margin-bottom:0}
.axis-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.axis-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.axis-name.x{color:var(--gx-c)}
.axis-name.y{color:var(--gy-c)}
.axis-name.z{color:var(--gz-c)}
.axis-thresh{font-size:11px;color:var(--text-2)}
.bar-wrap{position:relative;height:12px;border-radius:6px;overflow:hidden;margin-bottom:5px}
.bar-wrap.x{background:linear-gradient(to right,var(--gx-a),var(--gx-b),var(--gx-c))}
.bar-wrap.y{background:linear-gradient(to right,var(--gy-a),var(--gy-b),var(--gy-c))}
.bar-wrap.z{background:linear-gradient(to right,var(--gz-a),var(--gz-b),var(--gz-c))}
.bar-cover{position:absolute;right:0;top:0;height:100%;background:var(--bg-metric);transition:width .08s linear;width:100%}
.axis-slider{display:block;width:100%;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:var(--border-2);outline:none;cursor:pointer}
.axis-slider.x{accent-color:var(--gx-c)}
.axis-slider.y{accent-color:var(--gy-c)}
.axis-slider.z{accent-color:var(--gz-c)}

/* ── Coord + status footer ── */
.coord-line{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.coord-text{font-size:12px;color:var(--text-3);font-variant-numeric:tabular-nums;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-pills{display:flex;align-items:center;gap:5px;flex-shrink:0}
.pill-dot{width:7px;height:7px;border-radius:50%;background:var(--border-2)}
.pill-dot.ok{background:#1D9E75}
.pill-dot.live{background:#E24B4A;animation:pulse .8s ease-in-out infinite alternate}
.session-id{font-size:10px;color:var(--text-3);text-align:right;margin-top:5px}

/* ── Start / Stop ── */
.btn-row{display:flex;gap:8px}
.btn{flex:1;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:transform .1s;letter-spacing:-.01em}
.btn:active{transform:scale(.97)}
.btn-start{background:#1D9E75;color:#fff;box-shadow:0 2px 8px rgba(29,158,117,.3)}
.btn-stop{background:#E24B4A;color:#fff;box-shadow:0 2px 8px rgba(226,75,74,.3)}

/* ── Mark button ── */
.btn-mark{background:#F5A623;color:#fff;font-size:20px;font-weight:700;padding:20px 16px;border:none;border-radius:14px;cursor:pointer;transition:transform .1s,background .15s;width:100%;letter-spacing:.01em;box-shadow:0 3px 12px rgba(245,166,35,.4)}
.btn-mark:active,.btn-mark.active{transform:scale(.97)}
.btn-mark.active{background:#1D9E75}
.btn-mark:disabled{background:var(--border-2);cursor:default;transform:none;box-shadow:none;color:var(--text-3)}

/* ── Log ── */
.log{max-height:200px;overflow-y:auto}
.log-empty{font-size:13px;color:var(--text-3);text-align:center;padding:18px 0}
.log-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.log-item:last-child{border-bottom:none}
.log-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.dot-auto{background:#E24B4A}
.dot-manual{background:#378ADD}
.log-info{flex:1;min-width:0}
.log-coords{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-meta{font-size:11px;color:var(--text-2);margin-top:2px}
.log-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;margin-left:3px}
.badge-auto{background:#FCEBEB;color:#A32D2D}
.badge-manual{background:#E6F1FB;color:#0C447C}
.count-badge{display:inline-block;background:#E24B4A;color:#fff;border-radius:10px;font-size:11px;font-weight:600;padding:1px 7px;margin-left:6px;vertical-align:middle}

/* ── Export + maps ── */
.btn-export-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}
.btn-export{padding:9px 4px;border:1px solid var(--border-2);border-radius:9px;background:var(--bg-metric);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;text-align:center}
.btn-export:active{opacity:.7}
.btn-maps{background:#1a73e8;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;padding:11px;cursor:pointer;width:100%;margin-top:8px}
.btn-maps:active{background:#1557b0}

/* ── Sync bar ── */
.sync-bar{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0}
.sync-dot.ok{background:#1D9E75}
.sync-dot.busy{background:#F5A623;animation:pulse .6s ease-in-out infinite alternate}
.sync-dot.err{background:#E24B4A}
.sync-label{font-size:12px;color:var(--text-2);flex:1}
.sync-link{font-size:12px;color:#1a73e8;text-decoration:none;flex-shrink:0}
</style>

<div class="header">
  <div class="logo"><img src="Spothole%20logo.jpg" alt="Spot Hole"></div>
  <div class="header-text">
    <div class="header-title">Spot Hole</div>
    <div class="header-sub">GPS + motion pothole logger</div>
  </div>
  <div class="header-status">
    <div class="hd" id="hd-gps"     title="GPS"></div>
    <div class="hd" id="hd-motion"  title="Motion"></div>
    <div class="hd" id="hd-running" title="Detecting"></div>
  </div>
</div>

<div class="main">

  <div class="card" id="sensor-card">

    <!-- Speed + Heading hero -->
    <div class="hero-row">
      <div class="hero-box">
        <div class="hero-val" id="spd">—</div>
        <div class="hero-lbl">mph</div>
      </div>
      <div class="hero-box">
        <div class="hero-val" id="hdg">—</div>
        <div class="hero-lbl">heading</div>
      </div>
    </div>

    <!-- X Y Z values -->
    <div class="accel-row">
      <div class="accel-box">
        <div class="accel-axis x">X</div>
        <div class="accel-val" id="xval">—</div>
        <div class="accel-unit">g lateral</div>
      </div>
      <div class="accel-box">
        <div class="accel-axis y">Y</div>
        <div class="accel-val" id="yval">—</div>
        <div class="accel-unit">g fore-aft</div>
      </div>
      <div class="accel-box">
        <div class="accel-axis z">Z</div>
        <div class="accel-val" id="zval">—</div>
        <div class="accel-unit">g vertical</div>
      </div>
    </div>

    <!-- Scrolling waveform graph -->
    <canvas id="accel-graph" height="72" style="width:100%;border-radius:10px;display:block;margin-bottom:14px;background:var(--bg-metric)"></canvas>

    <!-- X axis bar + slider -->
    <div class="axis-block">
      <div class="axis-header">
        <span class="axis-name x">X lateral</span>
        <span class="axis-thresh" id="thresh-x-val">1.5g</span>
      </div>
      <div class="bar-wrap x"><div class="bar-cover" id="bar-x"></div></div>
      <input class="axis-slider x" type="range" id="slider-x" min="0.1" max="3" step="0.1" value="1.5" oninput="updateThreshX(this.value)">
    </div>

    <!-- Y axis bar + slider -->
    <div class="axis-block">
      <div class="axis-header">
        <span class="axis-name y">Y fore-aft</span>
        <span class="axis-thresh" id="thresh-y-val">1.5g</span>
      </div>
      <div class="bar-wrap y"><div class="bar-cover" id="bar-y"></div></div>
      <input class="axis-slider y" type="range" id="slider-y" min="0.1" max="3" step="0.1" value="1.5" oninput="updateThreshY(this.value)">
    </div>

    <!-- Z axis bar + slider -->
    <div class="axis-block">
      <div class="axis-header">
        <span class="axis-name z">Z vertical</span>
        <span class="axis-thresh" id="thresh-z-val">1.0g</span>
      </div>
      <div class="bar-wrap z"><div class="bar-cover" id="bar-z"></div></div>
      <input class="axis-slider z" type="range" id="slider-z" min="0.1" max="3" step="0.1" value="1.0" oninput="updateThreshZ(this.value)">
    </div>

    <!-- Lat/lon + sensor status dots -->
    <div class="coord-line">
      <span class="coord-text" id="coord-display">No GPS</span>
      <div class="status-pills">
        <div class="pill-dot" id="dot-gps"    title="GPS"></div>
        <div class="pill-dot" id="dot-motion" title="Motion"></div>
        <div class="pill-dot" id="dot-running" title="Detecting"></div>
      </div>
    </div>
    <div class="session-id" id="session-display"></div>

  </div><!-- /sensor-card -->

  <div class="btn-row">
    <button class="btn btn-start" id="btn-start" onclick="startDetection()">&#9654; Start</button>
    <button class="btn btn-stop"  id="btn-stop"  onclick="stopDetection()" style="display:none">&#9646;&#9646; Stop</button>
  </div>

  <button class="btn-mark" id="btn-mark" onclick="manualMark()" disabled>
    &#128073; Tap to Mark Pothole
  </button>

  <div class="card" id="log-card">
    <div class="card-title">
      Logged potholes
      <span class="count-badge" id="count">0</span>
    </div>
    <div class="log" id="log">
      <div class="log-empty" id="log-empty">No potholes logged yet. Start detection and drive!</div>
    </div>
    <div class="btn-export-row">
      <button class="btn-export" onclick="exportCSV()">&#8681; CSV</button>
      <button class="btn-export" onclick="exportGPX()">&#128205; GPX</button>
      <button class="btn-export" onclick="exportKML()">&#127759; KML</button>
      <button class="btn-export" style="color:#E24B4A" onclick="clearLog()">&#128465; Clear</button>
    </div>
    <button class="btn-maps" onclick="openInGoogleMaps()">&#128506; Open in Google Maps</button>
    <div class="sync-bar">
      <span class="sync-dot" id="sync-dot"></span>
      <span class="sync-label" id="sync-label">Sheet sync: ready</span>
      <a class="sync-link" id="sheet-link" href="#" target="_blank" style="display:none">Open Sheet &#8599;</a>
    </div>
  </div>

</div><!-- /main -->

<script>
// ── Config ────────────────────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw-SPX3KVc-UqPVS5IJx_GSkGOYcSt3GqY3xMOb45qVWKQS5NYSZHNj46P5ahjuSZhAuw/exec';
const SHEET_URL  = 'https://docs.google.com/spreadsheets/d/1BXHayOuxIZd7H8Oqq5NRRxiFq90teX0k2pdfX1N_wmU/edit';
const SECRET     = 'spotholekey';

// ── Browser / OS detection ────────────────────────────────────────────────
const isIOS     = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isCriOS   = /CriOS/.test(navigator.userAgent);
const isAndroid = /Android/.test(navigator.userAgent);

// iOS Chrome overlay
if (isIOS && isCriOS) {
  document.body.insertAdjacentHTML('beforeend', `
    <div id="safari-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;gap:16px">
      <div style="font-size:52px">&#9992;</div>
      <div style="color:#fff;font-size:20px;font-weight:600">Open in Safari</div>
      <div style="color:#aeaeb2;font-size:14px;line-height:1.6">Spot Hole needs Safari on iPhone for<br>motion sensors and GPS to work.</div>
      <div style="color:#aeaeb2;font-size:13px;line-height:1.6">Tap the <strong style="color:#fff">&#9094; Share</strong> button at the bottom<br>of Chrome, then choose <strong style="color:#fff">Open in Safari</strong>.</div>
      <div style="width:100%;background:#1c1c1e;border-radius:10px;padding:12px 14px;color:#1a73e8;font-size:12px;word-break:break-all;text-align:left">${location.href}</div>
      <button onclick="navigator.clipboard.writeText(location.href).then(()=>this.textContent='&#10003; Copied!').catch(()=>{})" style="background:#1a73e8;color:#fff;border:none;border-radius:10px;padding:13px 28px;font-size:15px;font-weight:500;cursor:pointer">Copy Link</button>
    </div>
  `);
}

// ── DOM helpers ───────────────────────────────────────────────────────────
function setCoord(txt) { document.getElementById('coord-display').textContent = txt; }
function setPillDot(id, cls) {
  const el = document.getElementById(id);
  if (el) el.className = 'pill-dot' + (cls ? ' ' + cls : '');
}
function setHDot(id, cls) {
  const el = document.getElementById(id);
  if (el) el.className = 'hd' + (cls ? ' ' + cls : '');
}

// GPS permission state (Android Chrome + iOS Safari 16+)
if (navigator.permissions) {
  navigator.permissions.query({ name: 'geolocation' }).then(status => {
    const showDenied = () => {
      setCoord(isAndroid
        ? 'GPS denied — Chrome ⋮ → Settings → Site settings → Location'
        : 'GPS denied — iOS Settings → Safari → Location → Allow');
      setPillDot('dot-gps', '');
    };
    if (status.state === 'denied') showDenied();
    status.addEventListener('change', () => {
      if (status.state === 'granted') setCoord('GPS: ready');
      else if (status.state === 'denied') showDenied();
    });
  }).catch(() => {});
}

// ── Device label ──────────────────────────────────────────────────────────
function getDeviceLabel() {
  const ua = navigator.userAgent;
  let device = 'Unknown';
  if      (/iPad/.test(ua))    device = 'iPad';
  else if (/iPhone/.test(ua))  device = 'iPhone';
  else if (/Android/.test(ua)) {
    const m = ua.match(/Android[^;]*;\s*([^)]+)\)/);
    device = m ? m[1].trim() : 'Android';
  } else if (/Macintosh/.test(ua)) device = 'Mac';
  else if (/Windows/.test(ua))     device = 'Windows';
  let browser = 'Browser';
  if      (/CriOS/.test(ua))                        browser = 'Chrome iOS';
  else if (/FxiOS/.test(ua))                        browser = 'Firefox iOS';
  else if (/Safari/.test(ua) && !/Chrome/.test(ua)) browser = 'Safari';
  else if (/Chrome/.test(ua))                       browser = 'Chrome';
  else if (/Firefox/.test(ua))                      browser = 'Firefox';
  return device + ' / ' + browser;
}
const DEVICE = getDeviceLabel();

// ── Date key + daily persistence ─────────────────────────────────────────
function getDateKey() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function persistToday() {
  if (!potholes.length) return;
  try {
    const key = 'spothole_' + getDateKey();
    const existing = JSON.parse(localStorage.getItem(key) || '[]');
    const seen = new Set(existing.map(p => p.session_id + '|' + p.time));
    const merged = [...existing, ...potholes.filter(p => !seen.has(p.session_id + '|' + p.time))];
    localStorage.setItem(key, JSON.stringify(merged));
  } catch(e) {}
}
function getAllDayData() {
  try {
    const key = 'spothole_' + getDateKey();
    const stored = JSON.parse(localStorage.getItem(key) || '[]');
    const seen = new Set(stored.map(p => p.session_id + '|' + p.time));
    return [...stored, ...potholes.filter(p => !seen.has(p.session_id + '|' + p.time))];
  } catch(e) { return potholes; }
}

// ── Session ID ────────────────────────────────────────────────────────────
function makeSessionId() {
  const d = new Date(), p = n => String(n).padStart(2,'0');
  return `sess_${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
}
const SESSION_ID = makeSessionId();
document.getElementById('session-display').textContent = SESSION_ID;

if (SHEET_URL && !SHEET_URL.startsWith('YOUR')) {
  const lnk = document.getElementById('sheet-link');
  lnk.href = SHEET_URL;
  lnk.style.display = '';
}

// ── State ─────────────────────────────────────────────────────────────────
let running = false, gpsWatchId = null, motionHandler = null;
let lastGPS = null, potholes = [];
let lastX = 0, lastY = 0, lastZ = 0;
let threshX = 1.5, threshY = 1.5, threshZ = 1.0;
let cooldown = false, markCooldown = false;
let pendingRows = [], flushTimer = null, totalSynced = 0;
let motionPermissionGranted = false;

const headings = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];

// ── Thresholds ────────────────────────────────────────────────────────────
function updateThreshX(v) { threshX = parseFloat(v); document.getElementById('thresh-x-val').textContent = v + 'g'; drawGraph(); }
function updateThreshY(v) { threshY = parseFloat(v); document.getElementById('thresh-y-val').textContent = v + 'g'; drawGraph(); }
function updateThreshZ(v) { threshZ = parseFloat(v); document.getElementById('thresh-z-val').textContent = v + 'g'; drawGraph(); }

// ── Sync ──────────────────────────────────────────────────────────────────
function scheduleFlush() {
  if (flushTimer) return;
  flushTimer = setTimeout(() => { flushTimer = null; flushToSheet(); }, 10000);
}
async function flushToSheet() {
  if (!pendingRows.length) return;
  if (!SCRIPT_URL || SCRIPT_URL.startsWith('YOUR')) { setSyncStatus('', 'Sheet sync: not configured'); return; }
  const rows = pendingRows.splice(0);
  setSyncStatus('busy', 'Syncing ' + rows.length + ' row(s)…');
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        secret: SECRET,
        sheetName: getDateKey() + '_SpotholeData',
        rows: rows.map(p => [
          p.session_id, p.time, p.lat ?? '', p.lon ?? '',
          p.speed_mph, p.heading_deg ?? '', p.heading_compass,
          p.x_accel_g, p.y_accel_g, p.z_accel_g, p.type, p.device ?? ''
        ])
      })
    });
    totalSynced += rows.length;
    setSyncStatus('ok', `Synced · ${totalSynced} rows · ${new Date().toLocaleTimeString()}`);
  } catch(err) {
    pendingRows.unshift(...rows);
    setSyncStatus('err', 'Sync failed — will retry in 30s');
    setTimeout(() => { if (pendingRows.length) flushToSheet(); }, 30000);
  }
}
function setSyncStatus(state, msg) {
  document.getElementById('sync-dot').className = 'sync-dot' + (state ? ' ' + state : '');
  document.getElementById('sync-label').textContent = msg;
}

// ── Helpers ───────────────────────────────────────────────────────────────
function degToCompass(deg) {
  if (deg == null || isNaN(deg)) return '—';
  return headings[Math.round(deg / 22.5) % 16];
}
function mpsToMph(mps) { return (mps * 2.23694).toFixed(1); }

// ── Detection flow ────────────────────────────────────────────────────────
function startDetection() {
  running = true;
  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-stop').style.display  = '';
  document.getElementById('btn-mark').disabled = false;
  setPillDot('dot-running', 'live');
  setHDot('hd-running', 'live');
  startGPS();
  requestMotion();
}

function stopDetection() {
  running = false;
  document.getElementById('btn-start').style.display = '';
  document.getElementById('btn-stop').style.display  = 'none';
  document.getElementById('btn-mark').disabled = true;
  setPillDot('dot-running', '');
  setHDot('hd-running', '');
  setPillDot('dot-gps', '');    setHDot('hd-gps', '');
  setPillDot('dot-motion', ''); setHDot('hd-motion', '');
  if (gpsWatchId != null) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
  if (motionHandler)       { window.removeEventListener('devicemotion', motionHandler); motionHandler = null; }
  setCoord('Stopped');
  stopDisplay();
  if (pendingRows.length) { clearTimeout(flushTimer); flushTimer = null; flushToSheet(); }
  persistToday();
}

function startGPS() {
  if (!navigator.geolocation) { setCoord('Geolocation not supported'); return; }
  setCoord('GPS: searching…');
  gpsWatchId = navigator.geolocation.watchPosition(pos => {
    lastGPS = pos;
    const c = pos.coords;
    setCoord(`${c.latitude.toFixed(5)}, ${c.longitude.toFixed(5)}`);
    document.getElementById('spd').textContent = c.speed != null && c.speed >= 0 ? mpsToMph(c.speed) : '0.0';
    document.getElementById('hdg').textContent = c.heading != null && !isNaN(c.heading) ? degToCompass(c.heading) : '—';
    setPillDot('dot-gps', 'ok'); setHDot('hd-gps', 'ok');
  }, err => {
    if (err.code === 1) {
      setCoord(isAndroid
        ? 'GPS denied — Chrome ⋮ → Settings → Site settings → Location'
        : isCriOS
          ? 'GPS denied — iOS Settings → Chrome → Location → While Using'
          : 'GPS denied — iOS Settings → Safari → Location → Allow');
    } else {
      setCoord('GPS: ' + err.message);
    }
    setPillDot('dot-gps', ''); setHDot('hd-gps', '');
  }, { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 });
}

function requestMotion() {
  if (typeof DeviceMotionEvent === 'undefined') { return; }
  if (motionPermissionGranted) { attachMotionHandler(); return; }
  if (typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission()
      .then(s => {
        if (s === 'granted') { motionPermissionGranted = true; attachMotionHandler(); }
      })
      .catch(() => {});
  } else {
    motionPermissionGranted = true;
    attachMotionHandler();
  }
}

function attachMotionHandler() {
  if (motionHandler) return;
  motionHandler = e => {
    const ag = (e.acceleration && e.acceleration.x != null && e.acceleration.z != null)
      ? e.acceleration : e.accelerationIncludingGravity;
    if (!ag) return;
    const toG = v => v != null ? Math.abs(v) / 9.81 : 0;
    lastX = toG(ag.x);
    lastY = toG(ag.y);
    lastZ = toG(ag.z);
    // Detection runs at full sensor rate for accuracy
    if (running && !cooldown && lastGPS) {
      if (lastX > threshX || lastY > threshY || lastZ > threshZ) triggerDetection('auto');
    }
    setPillDot('dot-motion', 'ok'); setHDot('hd-motion', 'ok');
  };
  window.addEventListener('devicemotion', motionHandler);
  startDisplay();
}

// ── Throttled display + scrolling graph (4 Hz) ────────────────────────────
const GRAPH_LEN = 40;   // samples shown (~10 s at 4 Hz)
const gBuf = { x: new Array(GRAPH_LEN).fill(0), y: new Array(GRAPH_LEN).fill(0), z: new Array(GRAPH_LEN).fill(0) };
let displayTimer = null;

function startDisplay() {
  if (displayTimer) return;
  displayTimer = setInterval(() => {
    // Update numeric readouts
    document.getElementById('xval').textContent = lastX.toFixed(2);
    document.getElementById('yval').textContent = lastY.toFixed(2);
    document.getElementById('zval').textContent = lastZ.toFixed(2);
    // Update bars
    document.getElementById('bar-x').style.width = Math.max(0, 100 - Math.min(100, (lastX / threshX) * 100)) + '%';
    document.getElementById('bar-y').style.width = Math.max(0, 100 - Math.min(100, (lastY / threshY) * 100)) + '%';
    document.getElementById('bar-z').style.width = Math.max(0, 100 - Math.min(100, (lastZ / threshZ) * 100)) + '%';
    // Push sample into rolling buffers
    gBuf.x.push(lastX); gBuf.x.shift();
    gBuf.y.push(lastY); gBuf.y.shift();
    gBuf.z.push(lastZ); gBuf.z.shift();
    drawGraph();
  }, 250);
}

function stopDisplay() {
  if (displayTimer) { clearInterval(displayTimer); displayTimer = null; }
}

function drawGraph() {
  const canvas = document.getElementById('accel-graph');
  if (!canvas) return;
  // Size canvas to actual pixel width
  if (canvas.width !== canvas.offsetWidth) canvas.width = canvas.offsetWidth;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const scale = Math.max(threshX, threshY, threshZ, 0.2);
  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;

  // Background
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = dark ? '#2c2c2e' : '#f2f2f7';
  ctx.fillRect(0, 0, W, H);

  // Zero line + threshold line
  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 1;
  ctx.strokeStyle = dark ? 'rgba(255,255,255,.12)' : 'rgba(0,0,0,.1)';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.5); ctx.lineTo(W, H * 0.5);   // zero
  ctx.moveTo(0, 2);        ctx.lineTo(W, 2);           // max = threshold
  ctx.stroke();
  ctx.setLineDash([]);

  // Draw axis traces
  const colors = dark
    ? { x:'#38BDF8', y:'#A78BFA', z:'#34D39A' }
    : { x:'#0891B2', y:'#7C3AED', z:'#1D9E75' };

  ['x','y','z'].forEach(axis => {
    const data = gBuf[axis];
    ctx.strokeStyle = colors[axis];
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    data.forEach((v, i) => {
      const px = (i / (GRAPH_LEN - 1)) * W;
      const py = H - (v / scale) * H;          // bottom = 0, top = scale
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    });
    ctx.stroke();
  });

  // Legend: X Y Z dots top-right
  [['X', colors.x], ['Y', colors.y], ['Z', colors.z]].forEach(([lbl, col], i) => {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(W - 40 + i*14, 8, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = dark ? 'rgba(255,255,255,.5)' : 'rgba(0,0,0,.4)';
    ctx.font = '9px -apple-system,sans-serif';
    ctx.fillText(lbl, W - 40 + i*14 + 5, 11);
  });
}

// ── Detection ─────────────────────────────────────────────────────────────
function triggerDetection(type) {
  cooldown = true;
  setTimeout(() => { cooldown = false; }, 3000);
  const c = lastGPS ? lastGPS.coords : null;
  const entry = {
    session_id:      SESSION_ID,
    time:            new Date().toISOString(),
    lat:             c ? c.latitude  : null,
    lon:             c ? c.longitude : null,
    speed_mph:       c && c.speed != null && c.speed >= 0 ? parseFloat(mpsToMph(c.speed)) : 0,
    heading_deg:     c && c.heading != null ? Math.round(c.heading) : null,
    heading_compass: c && c.heading != null ? degToCompass(c.heading) : '—',
    x_accel_g:       parseFloat(lastX.toFixed(3)),
    y_accel_g:       parseFloat(lastY.toFixed(3)),
    z_accel_g:       parseFloat(lastZ.toFixed(3)),
    type,
    device: DEVICE
  };
  potholes.push(entry);
  pendingRows.push(entry);
  addLogItem(entry);
  const sc = document.getElementById('sensor-card');
  sc.classList.remove('flash-pothole');
  void sc.offsetWidth;
  sc.classList.add('flash-pothole');
  document.getElementById('count').textContent = potholes.length;
  setSyncStatus('busy', 'Syncing in ~10s…');
  scheduleFlush();
}

function manualMark() {
  if (markCooldown) return;
  const btn = document.getElementById('btn-mark');
  btn.classList.add('active'); btn.disabled = true; markCooldown = true;
  triggerDetection('manual');
  setTimeout(() => { btn.classList.remove('active'); btn.disabled = false; markCooldown = false; }, 1000);
}

// ── Log UI ────────────────────────────────────────────────────────────────
function addLogItem(e) {
  const empty = document.getElementById('log-empty');
  if (empty) empty.remove();
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'log-item';
  const latStr = e.lat != null ? e.lat.toFixed(5) : 'no GPS';
  const lonStr = e.lon != null ? e.lon.toFixed(5) : '';
  const t = new Date(e.time).toLocaleTimeString();
  const peak = Math.max(e.x_accel_g ?? 0, e.y_accel_g ?? 0, e.z_accel_g ?? 0);
  const axis = ['X','Y','Z'][[e.x_accel_g??0, e.y_accel_g??0, e.z_accel_g??0].indexOf(peak)];
  div.innerHTML = `
    <div class="log-dot ${e.type==='auto'?'dot-auto':'dot-manual'}"></div>
    <div class="log-info">
      <div class="log-coords">${latStr}${lonStr ? ', '+lonStr : ''}</div>
      <div class="log-meta">${t} &middot; ${e.speed_mph} mph &middot; ${e.heading_compass} &middot; peak ${peak.toFixed(2)}g (${axis})<span class="log-badge ${e.type==='auto'?'badge-auto':'badge-manual'}">${e.type}</span></div>
    </div>`;
  log.insertBefore(div, log.firstChild);
}

// ── Export ────────────────────────────────────────────────────────────────
const CSV_HDR = 'session_id,time,latitude,longitude,speed_mph,heading_deg,heading_compass,x_accel_g,y_accel_g,z_accel_g,type,device\n';

function exportCSV() {
  persistToday();
  const data = getAllDayData();
  if (!data.length) { alert('No potholes logged yet.'); return; }
  const rows = data.map(p =>
    `${p.session_id},${p.time},${p.lat??''},${p.lon??''},${p.speed_mph},${p.heading_deg??''},${p.heading_compass},${p.x_accel_g??''},${p.y_accel_g??''},${p.z_accel_g},"${p.type}","${p.device??''}"`
  ).join('\n');
  download(`${getDateKey()}_SpotholeData.csv`, CSV_HDR + rows, 'text/csv');
}

function exportGPX() {
  persistToday();
  const data = getAllDayData();
  if (!data.length) { alert('No potholes logged yet.'); return; }
  const pts = data.filter(p=>p.lat&&p.lon).map(p=>
    `  <wpt lat="${p.lat}" lon="${p.lon}"><time>${p.time}</time><name>${p.type} Z:${p.z_accel_g}g</name><desc>Session: ${p.session_id}, Speed: ${p.speed_mph} mph, Heading: ${p.heading_compass}, X: ${p.x_accel_g??''}g, Y: ${p.y_accel_g??''}g, Z: ${p.z_accel_g}g, Device: ${p.device??''}</desc></wpt>`
  ).join('\n');
  download(`${getDateKey()}_SpotholeData.gpx`, `<?xml version="1.0"?>\n<gpx version="1.1" creator="Spot Hole">\n${pts}\n</gpx>`, 'application/gpx+xml');
}

function exportKML() {
  persistToday();
  const data = getAllDayData();
  if (!data.length) { alert('No potholes logged yet.'); return; }
  const placemarks = data.filter(p=>p.lat&&p.lon).map(p => {
    const color = p.type === 'auto' ? 'ff0000ff' : 'ffff0000';
    return `  <Placemark>
    <name>${p.type==='auto'?'&#128308;':'&#128309;'} Z:${p.z_accel_g}g</name>
    <description>Time: ${p.time}&#10;Type: ${p.type}&#10;Speed: ${p.speed_mph} mph&#10;Heading: ${p.heading_compass}&#10;X: ${p.x_accel_g??''}g  Y: ${p.y_accel_g??''}g  Z: ${p.z_accel_g}g&#10;Session: ${p.session_id}&#10;Device: ${p.device??''}</description>
    <Style><IconStyle><color>${color}</color></IconStyle></Style>
    <Point><coordinates>${p.lon},${p.lat},0</coordinates></Point>
  </Placemark>`;
  }).join('\n');
  download(`${getDateKey()}_SpotholeData.kml`,
    `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n<Document>\n  <name>Spot Hole ${getDateKey()}</name>\n${placemarks}\n</Document>\n</kml>`,
    'application/vnd.google-earth.kml+xml');
}

function openInGoogleMaps() {
  const pts = potholes.filter(p => p.lat && p.lon);
  if (!pts.length) { alert('No GPS coordinates to show.'); return; }
  let url;
  if (pts.length === 1) {
    url = `https://www.google.com/maps/search/?api=1&query=${pts[0].lat},${pts[0].lon}`;
  } else {
    const shown = pts.slice(0, 10);
    const origin = `${shown[0].lat},${shown[0].lon}`;
    const dest   = `${shown[shown.length-1].lat},${shown[shown.length-1].lon}`;
    const wpts   = shown.slice(1,-1).map(p=>`${p.lat},${p.lon}`).join('|');
    url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}${wpts?'&waypoints='+wpts:''}`;
  }
  window.open(url, '_blank');
}

function download(name, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = name; a.click();
}

function clearLog() {
  const total = getAllDayData().length;
  if (!total) return;
  if (!confirm(`Clear all ${total} potholes logged today?`)) return;
  potholes = [];
  try { localStorage.removeItem('spothole_' + getDateKey()); } catch(e) {}
  document.getElementById('log').innerHTML = '<div class="log-empty" id="log-empty">No potholes logged yet. Start detection and drive!</div>';
  document.getElementById('count').textContent = '0';
}
</script>
